<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>羁绊四选一参考复刻</title>
  <style>
    :root {
      --blue-border: #174d86;
      --blue-top-a: #0a2447;
      --blue-top-b: #071a34;
      --blue-text: #2db0ff;
      --card-bg-a: rgba(9, 18, 31, 0.96);
      --card-bg-b: rgba(6, 11, 20, 0.98);
      --line: rgba(120, 164, 214, 0.2);
      --text: #e8edf3;
      --muted: #b8c1cb;
      --green: #19ea3f;
      --gold: #e8bb57;
      --purple-border: #4d2a73;
      --purple-top-a: #3f155f;
      --purple-top-b: #240b39;
      --purple-text: #d03eff;
      --shadow: 0 14px 30px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0c1219;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
    }

    .stage {
      width: 975px;
      height: 548px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 56% 62%, rgba(37, 164, 255, 0.34), transparent 11%),
        radial-gradient(circle at 70% 58%, rgba(188, 72, 255, 0.28), transparent 12%),
        radial-gradient(circle at 64% 70%, rgba(255, 180, 69, 0.22), transparent 10%),
        linear-gradient(rgba(9, 15, 22, 0.18), rgba(9, 15, 22, 0.18)),
        linear-gradient(135deg, #69727b 0%, #818a93 7%, #6b737d 14%, #59616a 21%, #7b848d 28%, #67707a 35%, #5c646d 42%, #79828c 49%, #656d76 56%, #5c646d 63%, #7c858e 70%, #69727c 77%, #5a616a 84%, #727b84 91%, #626b75 100%);
      background-size: auto, auto, auto, auto, 72px 72px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .layout {
      position: absolute;
      inset: 28px 4px 0;
    }

    .cards {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card {
      width: 212px;
      min-height: 338px;
      background: linear-gradient(180deg, var(--card-bg-a), var(--card-bg-b));
      border: 2px solid var(--blue-border);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(92, 145, 209, 0.06) 0 20%, transparent 20% 40%, rgba(92, 145, 209, 0.05) 40% 60%, transparent 60% 80%, rgba(92, 145, 209, 0.04) 80% 100%);
      opacity: 0.45;
      pointer-events: none;
    }

    .card.purple {
      border-color: var(--purple-border);
      background: linear-gradient(180deg, rgba(20, 11, 28, 0.96), rgba(12, 8, 18, 0.98));
    }

    .card-header {
      height: 33px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 0.03em;
      color: var(--blue-text);
      background: linear-gradient(180deg, var(--blue-top-a), var(--blue-top-b));
      border-bottom: 1px solid rgba(95, 154, 216, 0.18);
      position: relative;
      z-index: 1;
    }

    .card-header::after {
      content: "";
      position: absolute;
      inset: 3px;
      border: 1px solid rgba(99, 160, 224, 0.08);
      pointer-events: none;
    }

    .purple .card-header {
      color: var(--purple-text);
      background: linear-gradient(180deg, var(--purple-top-a), var(--purple-top-b));
      border-bottom-color: rgba(194, 104, 255, 0.16);
    }

    .body {
      position: relative;
      z-index: 1;
      padding: 21px 20px 18px;
    }

    .icon-box {
      width: 62px;
      height: 62px;
      margin: 0 auto 18px;
      padding: 3px;
      background: #0a1730;
      border: 2px solid #15549a;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.26);
    }

    .purple .icon-box {
      background: #27112f;
      border-color: #6c318d;
    }

    .icon {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      font-size: 27px;
      font-weight: 900;
      color: #9ee1ff;
      background:
        radial-gradient(circle at 50% 38%, rgba(67, 182, 255, 0.32), transparent 60%),
        linear-gradient(180deg, #0f3f72, #0a1930);
    }

    .purple .icon {
      color: #ffe37b;
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 185, 63, 0.38), transparent 60%),
        linear-gradient(180deg, #6d2c85, #2a112f);
    }

    .bond {
      margin-bottom: 14px;
      padding-bottom: 11px;
      border-bottom: 1px solid var(--line);
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .bond span {
      color: var(--gold);
    }

    .effects {
      display: grid;
      gap: 8px;
      font-size: 16px;
      font-weight: 800;
      color: var(--green);
      line-height: 1.22;
    }

    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .refresh {
      width: 176px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 17px;
      font-weight: 800;
      color: #eef3fa;
      background: linear-gradient(180deg, #287ce0, #1456a3);
      border: 2px solid rgba(76, 135, 201, 0.88);
      box-shadow: var(--shadow);
    }

    .refresh b {
      color: #ffdb4f;
    }

    .later {
      width: 110px;
      height: 28px;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      color: #f2f2f2;
      background: rgba(18, 20, 24, 0.94);
      border: 1px solid rgba(161, 161, 161, 0.34);
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="layout">
      <div class="cards">
        <section class="card">
          <div class="card-header">穿甲射击</div>
          <div class="body">
            <div class="icon-box"><div class="icon">✦</div></div>
            <div class="bond">羁绊：<span>神射手</span> (3/5)</div>
            <div class="effects">
              <div>+20攻击力</div>
              <div>+5%护甲穿透</div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-header">破箭式</div>
          <div class="body">
            <div class="icon-box"><div class="icon">⟐</div></div>
            <div class="bond">羁绊：<span>小成箭术</span> (0/3)</div>
            <div class="effects">
              <div>+20攻击力</div>
              <div>+2%射箭伤害</div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-header">连射</div>
          <div class="body">
            <div class="icon-box"><div class="icon">◈</div></div>
            <div class="bond">羁绊：<span>神射手</span> (3/5)</div>
            <div class="effects">
              <div>+15%攻击速度</div>
              <div>+1多重数量</div>
            </div>
          </div>
        </section>

        <section class="card purple">
          <div class="card-header">爆炸炼金</div>
          <div class="body">
            <div class="icon-box"><div class="icon">✹</div></div>
            <div class="bond">羁绊：<span>炼金术</span> (0/3)</div>
            <div class="effects">
              <div>+10%金币加成</div>
            </div>
          </div>
        </section>
      </div>

      <div class="footer">
        <div class="refresh">免费刷新：<b>9</b></div>
        <div class="later">等会再选</div>
      </div>
    </div>
  </div>
</body>
</html>
