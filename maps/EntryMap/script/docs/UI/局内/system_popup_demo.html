<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统弹窗 UI Demo</title>
  <style>
    :root {
      --bg-top: #1a1d27;
      --bg-bottom: #0c0e14;
      --panel: #11131b;
      --panel-edge: #2b2f3a;
      --panel-line: rgba(255, 255, 255, 0.08);
      --text: #f6f4ef;
      --text-soft: #b7b2a7;
      --gold: #f6c247;
      --gold-deep: #b97b1e;
      --green: #62d95a;
      --green-deep: #347c31;
      --purple: #7d63d7;
      --purple-deep: #4d3d8f;
      --blue: #4ba8f1;
      --blue-deep: #2d5e8e;
      --red: #e24b43;
      --shadow: 0 28px 64px rgba(0, 0, 0, 0.55);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 16% 24%, rgba(39, 159, 124, 0.22), transparent 18%),
        radial-gradient(circle at 78% 22%, rgba(255, 178, 68, 0.16), transparent 18%),
        radial-gradient(circle at 70% 68%, rgba(92, 111, 190, 0.12), transparent 22%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom) 72%);
    }

    body {
      font-family: "Microsoft YaHei UI", "Segoe UI Variable Display", sans-serif;
      color: var(--text);
    }

    button {
      font: inherit;
      color: inherit;
      background: none;
      border: 0;
      padding: 0;
      cursor: pointer;
    }

    .shell {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .stage {
      position: relative;
      width: 1080px;
      height: 640px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 16%),
        radial-gradient(circle at 50% 100%, rgba(255, 198, 97, 0.08), transparent 24%),
        linear-gradient(180deg, rgba(29, 32, 44, 0.96), rgba(14, 16, 23, 0.98));
      box-shadow: var(--shadow);
      overflow: hidden;
      transform-origin: center center;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 56%, rgba(13, 235, 183, 0.1), transparent 16%),
        radial-gradient(circle at 80% 24%, rgba(255, 196, 75, 0.08), transparent 18%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.02), transparent 22%);
      opacity: 0.92;
      pointer-events: none;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      pointer-events: none;
    }

    .demo-switcher {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      gap: 10px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      background: rgba(10, 12, 19, 0.72);
      backdrop-filter: blur(8px);
    }

    .demo-tab {
      min-width: 104px;
      min-height: 36px;
      padding: 0 16px;
      border: 1px solid #4b505f;
      border-radius: 999px;
      background: linear-gradient(180deg, #363a46, #242832 58%, #191c24);
      color: #efebe0;
      font-size: 14px;
      font-weight: 800;
      line-height: 34px;
      text-align: center;
      transition: transform 140ms ease, filter 140ms ease, border-color 140ms ease;
    }

    .demo-tab:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .demo-tab.is-active {
      border-color: #7a6130;
      background: linear-gradient(180deg, #ffd35c, #efb734 58%, #c27d14);
      color: #fff8ed;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.55);
    }

    .page {
      display: none;
      position: absolute;
      inset: 0;
      animation: fade-in 200ms ease;
    }

    .page.is-active {
      display: block;
    }

    .popup-layer {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding-bottom: 36px;
    }

    .popup-layer.dim::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 40%, rgba(0, 0, 0, 0.16), rgba(0, 0, 0, 0.46) 60%, rgba(0, 0, 0, 0.7));
      pointer-events: none;
    }

    .panel {
      position: relative;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(26, 29, 38, 0.98), rgba(14, 16, 23, 0.98));
      border: 1px solid var(--panel-edge);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      pointer-events: none;
    }

    .close-chip {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 30%, rgba(255, 255, 255, 0.18), transparent 24%),
        linear-gradient(180deg, #2b2e39, #171921 58%, #0e1015);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .close-chip.red::before {
      color: #ef4a45;
    }

    .close-chip::before {
      content: "✦";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #f3d057;
      font-size: 22px;
      font-weight: 900;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.45);
    }

    .angled-title {
      position: absolute;
      left: 28px;
      top: 22px;
      min-width: 260px;
      height: 74px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      font-size: 34px;
      font-weight: 900;
      color: #ffffff;
      text-shadow:
        0 2px 0 rgba(0, 0, 0, 0.62),
        0 0 10px rgba(0, 0, 0, 0.1);
      clip-path: polygon(0 0, 83% 0, 100% 50%, 83% 100%, 0 100%, 8% 50%);
    }

    .angled-title::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent 32%),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0 2px, transparent 2px 8px);
      mix-blend-mode: screen;
      opacity: 0.32;
      pointer-events: none;
    }

    .angled-title.purple {
      background: linear-gradient(90deg, #7f6ce2, #5d4cb6 68%, #2e293d);
    }

    .angled-title.green {
      background: linear-gradient(90deg, #5ccc57, #49a247 68%, #273424);
    }

    .shortcuts-panel {
      width: 620px;
      height: 396px;
      border-radius: 6px;
    }

    .shortcuts-panel .content {
      position: absolute;
      left: 32px;
      right: 32px;
      top: 110px;
      bottom: 30px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px 42px;
    }

    .shortcut-column {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .shortcut-row {
      display: grid;
      grid-template-columns: 68px minmax(0, 1fr);
      align-items: center;
      gap: 18px;
    }

    .keycap {
      position: relative;
      width: 58px;
      height: 58px;
      border-radius: 12px;
      background: linear-gradient(180deg, #f8f8f8, #d8d8d8 68%, #bdbdbd);
      border: 1px solid #878787;
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.56),
        0 4px 0 rgba(0, 0, 0, 0.16);
      color: #2f2f32;
      font-size: 30px;
      font-weight: 900;
      line-height: 56px;
      text-align: center;
    }

    .keycap.small {
      font-size: 20px;
    }

    .keycap::after {
      content: "";
      position: absolute;
      right: 6px;
      bottom: 6px;
      width: 10px;
      height: 10px;
      border-right: 2px solid rgba(0, 0, 0, 0.28);
      border-bottom: 2px solid rgba(0, 0, 0, 0.28);
      border-radius: 0 0 4px 0;
      opacity: 0.9;
    }

    .shortcut-label {
      font-size: 23px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.55);
      letter-spacing: 0.5px;
    }

    .grow-panel {
      width: 700px;
      height: 436px;
      border-radius: 8px;
    }

    .grow-panel .flow {
      position: absolute;
      left: 44px;
      right: 44px;
      top: 132px;
      display: grid;
      grid-template-columns: 126px 42px 1fr 42px 126px;
      align-items: center;
      gap: 8px;
    }

    .flow-card {
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    .flow-title {
      font-size: 24px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.55);
    }

    .market-icon,
    .swallow-icon,
    .equip-card {
      position: relative;
      overflow: hidden;
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.24);
    }

    .market-icon {
      width: 86px;
      height: 86px;
      border-radius: 8px;
      border: 1px solid #2b2f37;
      background: linear-gradient(180deg, #191b22, #0d0f14 62%, #090b10);
    }

    .market-icon::before {
      content: "黑\n市";
      white-space: pre;
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #ffe25e;
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      z-index: 1;
    }

    .market-icon::after {
      content: "";
      position: absolute;
      right: 12px;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translateY(-50%);
      clip-path: polygon(0 0, 100% 50%, 0 100%);
      background: linear-gradient(180deg, #78d5ff, #2ca7ff);
    }

    .equip-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
    }

    .equip-card {
      width: 92px;
      height: 92px;
      border-radius: 8px;
      border: 2px solid #e8bc35;
      background:
        linear-gradient(180deg, rgba(255, 228, 114, 0.1), transparent 22%),
        linear-gradient(180deg, #272a33, #13151b 66%, #0b0d11);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.06),
        0 0 18px rgba(255, 201, 74, 0.16);
    }

    .equip-card::before {
      content: "刃";
      position: absolute;
      inset: 12px 14px 26px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background:
        radial-gradient(circle at 30% 30%, #ffffff 0 12%, transparent 13%),
        linear-gradient(135deg, transparent 0 30%, #eceef4 30% 42%, transparent 42%),
        linear-gradient(135deg, transparent 0 48%, #d64b41 48% 63%, transparent 63%),
        linear-gradient(180deg, #3c404c, #1b1e26 66%, #101218);
      color: transparent;
    }

    .coin-tag {
      position: absolute;
      left: 16px;
      bottom: 8px;
      font-size: 15px;
      font-weight: 900;
      color: #7cff53;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.55);
    }

    .coin-tag::before {
      content: "◎";
      margin-right: 3px;
      color: #d5a23f;
    }

    .flow-arrow {
      display: grid;
      place-items: center;
      color: #7edc51;
      font-size: 40px;
      font-weight: 900;
      text-shadow: 0 0 12px rgba(126, 220, 81, 0.24);
    }

    .swallow-icon {
      width: 98px;
      height: 98px;
      border-radius: 10px;
      border: 2px solid #932fff;
      background:
        radial-gradient(circle at 50% 50%, rgba(183, 104, 255, 0.34), transparent 26%),
        linear-gradient(180deg, #221531, #130d1d 66%, #0a0711);
      box-shadow: 0 0 20px rgba(178, 72, 255, 0.24);
    }

    .swallow-icon::before {
      content: "吞";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #ffe44a;
      font-size: 34px;
      font-weight: 900;
      text-shadow: 0 0 12px rgba(255, 228, 74, 0.16);
      z-index: 1;
    }

    .swallow-icon::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 28%, rgba(194, 98, 255, 0.92) 28% 34%, transparent 34% 44%, rgba(122, 61, 255, 0.72) 44% 52%, transparent 52% 100%);
      animation: pulse 2.2s linear infinite;
    }

    .pause-panel {
      width: 654px;
      height: 364px;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(15, 17, 24, 0.94), rgba(9, 10, 14, 0.96)),
        radial-gradient(circle at 76% 52%, rgba(60, 85, 170, 0.08), transparent 22%);
    }

    .pause-panel::after {
      content: "";
      position: absolute;
      right: 40px;
      top: 84px;
      width: 210px;
      height: 210px;
      border-radius: 50%;
      border: 2px solid rgba(94, 129, 216, 0.12);
      box-shadow:
        0 0 0 18px rgba(94, 129, 216, 0.04),
        inset 0 0 0 8px rgba(94, 129, 216, 0.04);
      opacity: 0.8;
    }

    .pause-topbar {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 70px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background:
        linear-gradient(180deg, rgba(82, 169, 255, 0.32), rgba(39, 89, 134, 0.28)),
        linear-gradient(180deg, #2d5f8d, #1d3651 76%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .pause-topbar::before {
      content: "";
      position: absolute;
      left: 110px;
      right: 110px;
      top: 0;
      bottom: 0;
      background:
        radial-gradient(circle at 50% 28%, rgba(255, 255, 255, 0.18), transparent 24%),
        repeating-radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.12) 0 2px, transparent 2px 10px);
      opacity: 0.32;
    }

    .pause-title {
      position: absolute;
      left: 50%;
      top: 12px;
      transform: translateX(-50%);
      min-width: 220px;
      height: 44px;
      padding: 0 34px;
      border-radius: 0 0 14px 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: linear-gradient(180deg, #66b9ff, #3a7db2 70%, #2a5172);
      color: #ffffff;
      font-size: 34px;
      font-weight: 900;
      line-height: 40px;
      text-align: center;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.45);
    }

    .pause-message {
      position: absolute;
      left: 60px;
      right: 60px;
      top: 122px;
      color: #ffffff;
      font-size: 27px;
      font-weight: 900;
      line-height: 1.45;
      text-align: center;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.56);
    }

    .pause-message .player {
      color: #ff3731;
    }

    .resume-btn {
      position: absolute;
      left: 50%;
      bottom: 54px;
      transform: translateX(-50%);
      min-width: 164px;
      height: 48px;
      padding: 0 28px;
      border-radius: 10px;
      border: 1px solid #7b5b20;
      background:
        linear-gradient(180deg, #ffd95f, #efbc36 62%, #c17b15);
      color: #fff8ed;
      font-size: 18px;
      font-weight: 900;
      line-height: 46px;
      text-align: center;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.5);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 10px 22px rgba(0, 0, 0, 0.24);
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="stage" id="stage">
      <section class="page page-hotkeys is-active" data-page="hotkeys">
        <div class="popup-layer">
          <div class="panel shortcuts-panel">
            <div class="angled-title purple">快捷键</div>
            <div class="close-chip red" aria-hidden="true"></div>
            <div class="content">
              <div class="shortcut-column">
                <div class="shortcut-row"><div class="keycap">Q</div><div class="shortcut-label">神器升级</div></div>
                <div class="shortcut-row"><div class="keycap">W</div><div class="shortcut-label">野怪挑战</div></div>
                <div class="shortcut-row"><div class="keycap">E</div><div class="shortcut-label">主宰挑战</div></div>
                <div class="shortcut-row"><div class="keycap">R</div><div class="shortcut-label">爬塔挑战</div></div>
              </div>
              <div class="shortcut-column">
                <div class="shortcut-row"><div class="keycap">D</div><div class="shortcut-label">闪现</div></div>
                <div class="shortcut-row"><div class="keycap">F</div><div class="shortcut-label">杀敌符文抽奖</div></div>
                <div class="shortcut-row"><div class="keycap small">Esc</div><div class="shortcut-label">关闭弹窗</div></div>
                <div class="shortcut-row"><div class="keycap small">Tab</div><div class="shortcut-label">属性面板</div></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="page page-grow" data-page="grow">
        <div class="popup-layer">
          <div class="panel grow-panel">
            <div class="angled-title green">如何变强</div>
            <div class="close-chip red" aria-hidden="true"></div>
            <div class="flow">
              <div class="flow-card">
                <div class="market-icon"></div>
                <div class="flow-title">黑市</div>
              </div>
              <div class="flow-arrow">➜</div>
              <div class="flow-card">
                <div class="equip-group">
                  <div class="equip-card"><div class="coin-tag">50</div></div>
                  <div class="equip-card"><div class="coin-tag">50</div></div>
                  <div class="equip-card"><div class="coin-tag">50</div></div>
                </div>
                <div class="flow-title">购买相同三件装备</div>
              </div>
              <div class="flow-arrow">➜</div>
              <div class="flow-card">
                <div class="swallow-icon"></div>
                <div class="flow-title">吞噬变强</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="page page-pause" data-page="pause">
        <div class="popup-layer dim">
          <div class="panel pause-panel">
            <div class="pause-topbar"></div>
            <div class="pause-title">暂停游戏</div>
            <div class="pause-message">玩家<span class="player">WindXRan</span>暂停了游戏</div>
            <div class="resume-btn">回到游戏</div>
          </div>
        </div>
      </section>

      <div class="demo-switcher">
        <button class="demo-tab is-active" data-page="hotkeys">快捷键</button>
        <button class="demo-tab" data-page="grow">如何变强</button>
        <button class="demo-tab" data-page="pause">暂停游戏</button>
      </div>
    </div>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const pages = Array.from(document.querySelectorAll(".page"));
    const tabs = Array.from(document.querySelectorAll(".demo-tab"));

    function fitStage() {
      const viewportWidth = window.innerWidth - 24;
      const viewportHeight = window.innerHeight - 24;
      const scale = Math.min(viewportWidth / 1080, viewportHeight / 640, 1);
      stage.style.transform = "scale(" + scale + ")";
    }

    function showPage(pageKey) {
      pages.forEach((page) => {
        page.classList.toggle("is-active", page.dataset.page === pageKey);
      });

      tabs.forEach((tab) => {
        tab.classList.toggle("is-active", tab.dataset.page === pageKey);
      });

      if (location.hash !== "#" + pageKey) {
        history.replaceState(null, "", "#" + pageKey);
      }
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        showPage(tab.dataset.page);
      });
    });

    window.addEventListener("resize", fitStage);

    fitStage();
    const initial = location.hash.replace("#", "");
    showPage(["hotkeys", "grow", "pause"].includes(initial) ? initial : "hotkeys");
  </script>
</body>
</html>
