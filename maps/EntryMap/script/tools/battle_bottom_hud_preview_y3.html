<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>UI Preview: BattleBottomHUD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background:
                radial-gradient(circle at 50% -10%, rgba(73, 120, 182, 0.18), transparent 30%),
                linear-gradient(180deg, #050b11 0%, #08101a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }
        .canvas {
            width: 1920px;
            height: 1080px;
            transform: scale(0.62);
            transform-origin: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(169, 204, 247, 0.12);
            background:
                radial-gradient(circle at 50% 92%, rgba(78, 144, 226, 0.16), transparent 24%),
                radial-gradient(circle at 18% 90%, rgba(255, 191, 88, 0.10), transparent 18%),
                radial-gradient(circle at 82% 88%, rgba(91, 186, 170, 0.08), transparent 18%),
                radial-gradient(circle at 12% 20%, rgba(255, 214, 126, 0.08), transparent 18%),
                radial-gradient(circle at 86% 14%, rgba(90, 154, 255, 0.12), transparent 20%),
                linear-gradient(180deg, rgba(73, 103, 45, 0.35) 0%, rgba(48, 72, 31, 0.10) 18%, rgba(7, 11, 16, 0) 32%),
                linear-gradient(180deg, #0f1720 0%, #0b1116 100%);
        }
        [data-type] { position: absolute; }
        [data-type="layout"] { position: absolute; }
        [data-type="image"] {
            overflow: hidden;
            pointer-events: none;
        }
        [data-type="label"] {
            display: flex;
            padding: 0 2px;
            white-space: pre-wrap;
            overflow: hidden;
            line-height: 1.15;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.55);
            letter-spacing: 0.2px;
        }
        [data-type="button"] {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.12),
                0 8px 18px rgba(0, 0, 0, 0.28);
            color: #eef4fb;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
        }
        [data-type="button"][data-preset="blue"] {
            background: linear-gradient(180deg, rgba(64, 123, 190, 0.96) 0%, rgba(27, 69, 118, 0.98) 100%);
        }
        [data-type="button"][data-preset="gold"] {
            background: linear-gradient(180deg, rgba(178, 132, 44, 0.98) 0%, rgba(111, 76, 19, 0.98) 100%);
        }
        [data-type="button"]::after {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: 7px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }
        .evolve-ready {
            cursor: pointer;
            border-radius: 16px;
            transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
            animation: evolvePulse 1.35s ease-in-out infinite;
        }
        .evolve-ready:hover {
            transform: translateY(-1px) scale(1.015);
            filter: brightness(1.08);
            box-shadow: 0 0 0 1px rgba(255, 217, 102, 0.35), 0 0 18px rgba(255, 177, 37, 0.28);
        }
        .evolve-ready:active {
            transform: scale(0.992);
            filter: brightness(0.98);
        }
        .evolve-ready.is-resolving {
            animation: none;
            transform: scale(0.995);
            filter: brightness(0.96);
            box-shadow: 0 0 0 0 rgba(255, 177, 37, 0);
        }
        .challenge-card {
            cursor: pointer;
            transition: transform 0.16s ease, filter 0.16s ease, box-shadow 0.16s ease;
        }
        .challenge-card:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 0 16px rgba(255, 201, 93, 0.20);
        }
        .challenge-card:active {
            transform: scale(0.988);
        }
        .challenge-card [data-name="title"] {
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.75);
        }
        .challenge-card [data-name="auto"] {
            text-shadow:
                0 0 6px rgba(92, 255, 94, 0.35),
                0 1px 1px rgba(0, 0, 0, 0.85);
            font-weight: 700;
        }
        .challenge-card [data-name="count"] {
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
            font-weight: 700;
        }
        .exp-normal {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease;
        }
        .exp-normal.is-visible {
            opacity: 1;
        }
        @keyframes evolvePulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 177, 37, 0.00), 0 0 14px rgba(255, 177, 37, 0.18);
            }
            50% {
                box-shadow: 0 0 0 2px rgba(255, 217, 102, 0.32), 0 0 26px rgba(255, 177, 37, 0.42);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 177, 37, 0.00), 0 0 14px rgba(255, 177, 37, 0.18);
            }
        }
    </style>
</head>

            const r = parseInt(hex.slice(0, 2), 16);
            const g = parseInt(hex.slice(2, 4), 16);
            const b = parseInt(hex.slice(4, 6), 16);
            return `rgb(${r}, ${g}, ${b})`;
        }
        if (hex.length === 8) {
            const r = parseInt(hex.slice(0, 2), 16);
            const g = parseInt(hex.slice(2, 4), 16);
            const b = parseInt(hex.slice(4, 6), 16);
            const a = parseInt(hex.slice(6, 8), 16) / 255;
            return `rgba(${r}, ${g}, ${b}, ${a.toFixed(3)})`;
        }
        return value;
    };

        const alignMap = {
            left: "flex-start",
            center: "center",
            right: "flex-end",
            top: "flex-start",
            middle: "center",
        bottom: "flex-end",
    };

        document.querySelectorAll("[data-type]").forEach((node) => {
            const type = node.dataset.type;
            const color = parseColor(node.dataset.color);
            const bgColor = parseColor(node.dataset.bgColor);
            const fontSize = node.dataset.fontSize;
        const align = (node.dataset.align || "").split(",");

        if (bgColor) {
            node.style.background = bgColor;
        }

        if (type === "image") {
            if (color) {
                node.style.background = color;
            } else if (node.dataset.image && node.dataset.image !== "999") {
                node.style.background = "linear-gradient(180deg, rgba(210,225,244,0.18) 0%, rgba(98,122,150,0.18) 100%)";
            }
            if (node.dataset.scale9 === "true") {
                node.style.borderRadius = "10px";
            }
            if (node.dataset.image && node.dataset.image !== "999") {
                node.style.boxShadow = "inset 0 0 0 1px rgba(255,255,255,0.08)";
            }
        }

        if (type === "label") {
            node.style.color = color || "#e6eef8";
            if (fontSize) node.style.fontSize = `${fontSize}px`;
            node.style.justifyContent = alignMap[align[0]] || "flex-start";
            node.style.alignItems = alignMap[align[1]] || "center";
            if ((align[1] || "").toLowerCase() === "top") {
                node.style.paddingTop = "2px";
            }
        }

            if (type === "button") {
                if (fontSize) node.style.fontSize = `${fontSize}px`;
            }
        });

        document.querySelectorAll('[data-name^="challenge_"]').forEach((node) => {
            if (node.dataset.name !== "challenge_row") {
                node.classList.add("challenge-card");
            }
        });

        const evolveCta = document.querySelector('[data-name="evolve_cta"]');
        const evolveText = document.querySelector('[data-name="evolve_text"]');
        const expNormalOverlay = document.querySelector('[data-name="exp_normal_overlay"]');
        if (evolveCta) {
            evolveCta.classList.add("evolve-ready");
            if (expNormalOverlay) {
                expNormalOverlay.classList.add("exp-normal");
            }
            evolveCta.addEventListener("click", () => {
                evolveCta.classList.add("is-resolving");
                setTimeout(() => {
                    evolveCta.style.opacity = "0";
                    evolveCta.style.pointerEvents = "none";
                    if (expNormalOverlay) {
                        expNormalOverlay.classList.add("is-visible");
                    }
                }, 180);
                setTimeout(() => {
                    if (expNormalOverlay) {
                        expNormalOverlay.classList.remove("is-visible");
                    }
                    evolveCta.style.opacity = "1";
                    evolveCta.style.pointerEvents = "auto";
                    evolveCta.classList.remove("is-resolving");
                }, 1250);
            });
        }
})();
</script>
