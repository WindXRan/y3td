<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>存档界面预览</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif;
      color: #eef3ff;
      background:
        radial-gradient(circle at 48% 38%, rgba(76, 132, 102, .34), transparent 28%),
        linear-gradient(135deg, #15200f 0%, #263319 45%, #0c1117 100%);
    }
    .hud-shadow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .45;
      background:
        linear-gradient(to bottom, rgba(5, 8, 12, .65) 0 46px, transparent 46px),
        linear-gradient(to top, rgba(5, 8, 12, .75) 0 86px, transparent 86px);
    }
    .archive {
      position: absolute;
      left: 52px;
      top: 34px;
      width: 1220px;
      height: 770px;
      background: #0e1118;
      border: 8px solid #333744;
      box-shadow: 0 0 0 3px #171a23 inset, 0 18px 60px rgba(0,0,0,.42);
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 18px;
      padding: 14px 16px 16px 12px;
    }
    .sidebar {
      background: #151820;
      border-right: 2px solid #282c37;
      padding: 30px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .logo { color: #ffd347; font-size: 30px; line-height: 1; margin-bottom: 28px; }
    .logo::after { content: ""; display: block; width: 92px; height: 4px; margin-top: 14px; background: #a48b43; }
    .side-tab {
      height: 34px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      color: #cfd7e8;
      background: transparent;
      border-left: 4px solid transparent;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
    }
    .side-tab.active { background: #75819a; color: white; border-left-color: #f3d16b; }
    .side-tab.disabled { color: #6d7280; }
    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: 1fr;
      gap: 0;
      padding-right: 8px;
    }
    .main.no-topbar { grid-template-rows: 1fr; }
    .topbar { position: relative; display: flex; justify-content: center; align-items: center; }
    .close {
      position: absolute;
      right: 14px;
      top: 10px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      background: #383c4a;
      color: white;
      font-size: 18px;
    }
    .content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 230px;
      gap: 14px;
      min-height: 0;
    }
    .content.talent-content { grid-template-columns: minmax(0, 1fr) 250px; }
    .card {
      min-width: 0;
      min-height: 0;
      background: #12151d;
      border: 4px solid #2b303b;
      box-shadow: 0 0 0 1px #11141b inset;
      overflow: hidden;
    }
    .section-title {
      height: 34px;
      margin: 8px 10px 0;
      padding: 4px 10px;
      background: #49679d;
      color: white;
      font-size: 20px;
      display: flex;
      align-items: center;
    }
    .tabs {
      height: 48px;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
      padding: 8px 10px 6px;
      border-bottom: 3px solid #2a2f3a;
    }
    .tab {
      min-width: 0;
      height: 34px;
      display: grid;
      place-items: center;
      background: #b98b2f;
      color: #fff3dc;
      border: 1px solid rgba(255, 224, 128, .28);
      font-size: 15px;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    .tab.active { background: #7e879a; border-color: #f3d16b; }
    .grid-wrap {
      height: calc(100% - 48px);
      padding: 14px 14px 18px;
      overflow-y: auto;
      scrollbar-color: #555d70 #151922;
      scrollbar-width: thin;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(8, 76px);
      grid-auto-rows: 76px;
      gap: 14px 16px;
      align-content: start;
    }
    .item {
      position: relative;
      width: 76px;
      height: 76px;
      background: #202531;
      border: 2px solid #596173;
      box-shadow: 0 0 0 2px #141821 inset;
      cursor: pointer;
      user-select: none;
    }
    .item:hover, .tab:hover, .side-tab:not(.disabled):hover { filter: brightness(1.14); }
    .item.active { border-color: #f2d06b; box-shadow: 0 0 0 2px rgba(242,208,107,.35), 0 0 16px rgba(242,208,107,.25); }
    .icon {
      position: absolute;
      left: 13px;
      top: 10px;
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      background: #e7dfca;
      color: #222733;
      font-weight: 700;
      font-size: 24px;
    }
    .item.rare .icon { background: #6492c8; color: #09111f; }
    .item.sr .icon { background: #8c5bc2; color: white; }
    .item.ssr .icon { background: linear-gradient(135deg, #e0b846, #fff1a7); color: #412a08; }
    .name {
      position: absolute;
      left: 4px;
      right: 4px;
      bottom: 3px;
      font-size: 12px;
      color: #dfe6f3;
      text-align: center;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .detail {
      padding: 8px 10px;
      display: grid;
      grid-template-rows: 34px 112px auto 1fr 42px;
      gap: 12px;
    }
    .detail-title { background: #49679d; padding: 5px 10px; font-size: 20px; }
    .big-icon { width: 96px; height: 96px; margin: 0 auto; display: grid; place-items: center; background: #e7dfca; color: #222; font-size: 40px; font-weight: 700; }
    .big-icon.rare { background: #6492c8; color: #09111f; }
    .big-icon.sr { background: #8c5bc2; color: white; }
    .big-icon.ssr { background: linear-gradient(135deg, #e0b846, #fff1a7); color: #412a08; }
    .detail h2 { margin: 0; font-size: 24px; font-weight: 500; }
    .line { height: 1px; background: #515765; margin: 8px 0 12px; }
    .desc { color: #75ff62; font-size: 14px; line-height: 2.4; }
    .button { height: 38px; display: grid; place-items: center; background: #b98b2f; color: white; border: 1px solid #e0bd64; }
    .button { cursor: pointer; user-select: none; }
    .button:hover { filter: brightness(1.12); }
    .profile-layout {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      padding: 14px;
      height: 100%;
    }
    .profile-card { padding: 10px; background: #151922; border: 3px solid #2b303b; min-height: 0; }
    .avatar { width: 90px; height: 90px; margin: 18px auto 12px; background: #b9c0cb; }
    .row { height: 30px; margin: 8px 0; padding: 0 8px; display: flex; align-items: center; justify-content: space-between; background: #242832; color: #dbe3f2; font-size: 14px; }
    .row strong { color: #75ff62; font-weight: 500; }
    .empty-page { height: 100%; display: grid; place-items: center; color: #8f99ad; font-size: 18px; }
    .talent-layout {
      height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 226px);
      gap: 12px;
      padding: 16px 12px;
      justify-content: start;
      align-content: start;
    }
    .talent-column {
      position: relative;
      min-width: 0;
      background: linear-gradient(180deg, rgba(80,30,24,.22), rgba(10,14,22,.92));
      border: 4px solid #2b303b;
      overflow: hidden;
      padding: 10px 8px 0;
      height: 500px;
    }
    .talent-column.survival { background: linear-gradient(180deg, rgba(22,48,74,.26), rgba(10,14,22,.92)); }
    .talent-column.resource { background: linear-gradient(180deg, rgba(36,76,28,.25), rgba(10,14,22,.92)); }
    .talent-nodes {
      height: 434px;
      padding: 2px 0 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .talent-row {
      height: 78px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 14px;
    }
    .talent-row.final { height: 72px; }
    .talent-node {
      position: relative;
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      background: #202531;
      border: 3px solid #4c5364;
      cursor: pointer;
      box-shadow: 0 0 0 2px #11141b inset;
    }
    .talent-node.active { border-color: #ffd86b; box-shadow: 0 0 18px rgba(255,216,107,.32); }
    .talent-node.learned { border-color: #52d66f; }
    .talent-node.locked { filter: grayscale(.9) brightness(.55); }
    .talent-node .node-icon { font-size: 26px; }
    .talent-node .node-level { position: absolute; right: -4px; bottom: -4px; min-width: 26px; height: 17px; display: grid; place-items: center; background: #1c2230; border: 1px solid #657085; color: #75ff62; font-size: 12px; }
    .talent-node-name { position: absolute; left: 50%; top: 61px; width: 72px; transform: translateX(-50%); text-align: center; font-size: 12px; color: #eaf0fb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .talent-footer { height: 56px; display: flex; align-items: center; justify-content: center; gap: 2px; color: white; font-size: 24px; line-height: 1; font-weight: 800; text-shadow: 0 2px 0 #10131b; white-space: nowrap; }
    .talent-footer strong { color: #75ff62; font-size: 32px; min-width: 18px; text-align: center; }
    .talent-point { color: #75ff62; }
    .pool-layout .grid { grid-template-columns: repeat(9, 64px); grid-auto-rows: 64px; gap: 14px; }
    .pool-layout .item { width: 64px; height: 64px; }
    .pool-layout .icon { left: 9px; top: 7px; width: 46px; height: 46px; font-size: 22px; }
    .pool-layout .name { font-size: 11px; bottom: 2px; }
    .chest-layout {
      height: 100%;
      display: grid;
      grid-template-rows: 52px 1fr 72px;
      gap: 14px;
      padding: 12px;
    }
    .chest-mode-list { display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center; border-bottom: 3px solid #2a2f3a; padding: 0 0 10px; }
    .chest-title { color: #ffd86b; font-size: 28px; line-height: 1; font-weight: 800; text-shadow: 0 2px 0 #2b1806; white-space: nowrap; }
    .mode-tabs { display: flex; gap: 8px; min-width: 0; }
    .mode-tab { width: 112px; min-height: 34px; padding: 0 6px; display: grid; place-items: center; text-align: center; background: #b98b2f; border: 1px solid #e0bd64; cursor: pointer; white-space: nowrap; font-size: 14px; }
    .mode-tab.active { background: #7e879a; }
    .mode-tab.locked { background: #3a4050; color: #939cab; border-color: #555b67; }
    .utility-links { display: flex; gap: 8px; justify-content: flex-end; }
    .utility-link { height: 30px; padding: 0 10px; display: grid; place-items: center; background: #252b37; border: 1px solid #4b5364; color: #dce4f2; cursor: pointer; }
    .chest-stage {
      position: relative;
      min-height: 0;
      background: radial-gradient(circle at 50% 48%, rgba(178,132,44,.22), transparent 34%), #10131b;
      border: 3px solid #2b303b;
      overflow: hidden;
    }
    .altar {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      width: 330px;
      height: 300px;
    }
    .glow { position: absolute; inset: 20px; border-radius: 50%; background: radial-gradient(circle, rgba(255,205,86,.3), transparent 65%); filter: blur(4px); }
    .chest-box {
      position: absolute;
      left: 92px;
      top: 72px;
      width: 146px;
      height: 112px;
      background: linear-gradient(#d1a23b, #7b4e1b);
      border: 4px solid #f1d27c;
      box-shadow: 0 18px 0 #3a2713, 0 0 34px rgba(255,206,90,.35);
      cursor: pointer;
    }
    .chest-box::before { content: ""; position: absolute; left: 20px; right: 20px; top: -28px; height: 42px; border: 5px solid #f1d27c; border-bottom: none; border-radius: 60px 60px 0 0; }
    .chest-box::after { content: "宝"; position: absolute; inset: 32px 46px; display: grid; place-items: center; background: #432813; color: #ffd86b; font-size: 28px; font-weight: 700; }
    .chest-actions { display: grid; grid-template-columns: 180px 180px; justify-content: center; gap: 18px; }
    .draw-button { display: grid; place-items: center; background: #b98b2f; border: 1px solid #e0bd64; color: white; cursor: pointer; font-size: 18px; }
    .draw-button.secondary { background: #3a4050; }
    .reward-strip { position: absolute; left: 18px; right: 18px; bottom: 18px; display: grid; grid-template-columns: repeat(5, 54px); justify-content: center; gap: 12px; }
    .mini-reward { width: 54px; height: 54px; display: grid; place-items: center; background: #202531; border: 2px solid #596173; color: #ffd86b; }
    .unlock-banner { position: absolute; left: 18px; top: 18px; padding: 8px 12px; background: rgba(18,22,30,.86); border: 1px solid #4b5364; color: #ffd86b; }
    .pool-header { height: 44px; display: flex; align-items: center; gap: 10px; padding: 6px 10px 4px; border-bottom: 3px solid #2a2f3a; }
    .back-button { height: 32px; width: 68px; display: grid; place-items: center; background: #1e2430; border: 1px solid #d8b34b; color: #ffd86b; cursor: pointer; }
    .pool-chip { height: 32px; padding: 0 12px; display: grid; place-items: center; background: #dca83a; color: white; font-weight: 700; cursor: pointer; }
    .pool-chip.active { background: #7e879a; border: 1px solid #f3d16b; }
    .pool-chip.locked { background: #505765; color: #aeb6c5; }
    .rarity-block { margin-bottom: 14px; }
    .rarity-title { height: 26px; display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 800; letter-spacing: 1px; }
    .rarity-title.n { color: #29e36f; }
    .rarity-title.r { color: #1ab7dd; }
    .rarity-title.sr { color: #bb46ff; }
    .rarity-title::after { content: ""; flex: 1; height: 4px; background: repeating-linear-gradient(90deg, currentColor 0 8px, transparent 8px 14px); opacity: .8; }
    .rarity-grid { display: grid; grid-template-columns: repeat(10, 58px); grid-auto-rows: 58px; gap: 9px 11px; }
    .rarity-grid .item { width: 58px; height: 58px; }
    .rarity-grid .icon { left: 7px; top: 5px; width: 44px; height: 44px; font-size: 20px; }
    .rarity-grid .name { display: none; }
    .result-overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(4, 6, 10, .72);
      z-index: 20;
    }
    .result-overlay.show { display: grid; }
    .result-panel {
      width: 760px;
      min-height: 420px;
      background: #10131b;
      border: 6px solid #333744;
      box-shadow: 0 0 0 2px #171a23 inset, 0 24px 80px rgba(0,0,0,.5);
      padding: 18px 22px 20px;
    }
    .result-head { display: flex; justify-content: space-between; align-items: center; height: 42px; border-bottom: 3px solid #2a2f3a; }
    .result-head strong { color: #ffd86b; font-size: 26px; }
    .result-close { width: 38px; height: 38px; display: grid; place-items: center; background: #383c4a; cursor: pointer; }
    .result-grid { padding: 24px 0 14px; display: grid; grid-template-columns: repeat(5, 112px); grid-auto-rows: 132px; justify-content: center; gap: 16px 18px; }
    .result-card { position: relative; background: #202531; border: 3px solid #596173; display: grid; grid-template-rows: 82px 1fr; place-items: center; }
    .result-card .icon { position: static; width: 62px; height: 62px; font-size: 30px; }
    .result-card .name { position: static; width: 100%; padding: 0 4px; font-size: 13px; }
    .result-card.rare { border-color: #2fbbe8; }
    .result-card.sr { border-color: #bb46ff; box-shadow: 0 0 18px rgba(187,70,255,.25); }
    .result-card.ssr { border-color: #ffd86b; box-shadow: 0 0 26px rgba(255,216,107,.35); }
    .result-actions { display: flex; justify-content: center; gap: 16px; margin-top: 8px; }
    .result-button { width: 160px; height: 38px; display: grid; place-items: center; background: #b98b2f; border: 1px solid #e0bd64; cursor: pointer; }
    .result-button.secondary { background: #3a4050; }
  </style>
</head>
<body>
  <div class="hud-shadow"></div>
  <div class="archive">
    <aside class="sidebar">
      <div class="logo">存档</div>
      <div class="side-tab active" data-page="profile">我的信息</div>
      <div class="side-tab" data-page="universal">通用存档</div>
      <div class="side-tab" data-page="pool">夺宝宝箱</div>
      <div class="side-tab" data-page="talent">天赋</div>
      <div class="side-tab" data-page="equipment">神装</div>
      <div class="side-tab disabled" data-page="hero">英雄</div>
      <div class="side-tab disabled" data-page="shop">商店</div>
    </aside>

    <main class="main">
      <section class="content">
        <div class="card" id="listCard">
          <div id="listRoot"></div>
        </div>

        <aside class="card detail">
          <div class="detail-title" id="detailType">详情</div>
          <div class="big-icon" id="detailIcon">1</div>
          <div>
            <h2 id="detailTitle">难度 1 通关奖励</h2>
            <div class="line"></div>
            <div class="desc" id="detailDesc"></div>
          </div>
          <div></div>
          <div class="button" id="detailButton">查看奖励状态</div>
        </aside>
      </section>
    </main>
  </div>
  <div class="result-overlay" id="resultOverlay">
    <div class="result-panel">
      <div class="result-head"><strong id="resultTitle">抽卡结果</strong><div class="result-close" id="resultClose">×</div></div>
      <div class="result-grid" id="resultGrid"></div>
      <div class="result-actions">
        <div class="result-button" id="resultAgain">再抽一次</div>
        <div class="result-button secondary" id="resultConfirm">确定</div>
      </div>
    </div>
  </div>
  <script>
    const tabs = [
      { key: 'pass', label: '通关存档' },
      { key: 'map', label: '地图等级' },
      { key: 'community', label: '社区福利' },
      { key: 'achievement', label: '成就' },
      { key: 'lottery', label: '群抽奖' },
      { key: 'test', label: '测试大厅' },
      { key: 'fish', label: '捕鱼模式' },
    ];

    const universal = {
      pass: Array.from({ length: 15 }, (_, i) => ({
        id: `pass_${i + 1}`,
        title: `难度 ${i + 1} 通关奖励`,
        icon: String(i + 1),
        rarity: i >= 9 ? 'ssr' : i >= 6 ? 'sr' : i >= 3 ? 'rare' : '',
        desc: [`累计通关难度 ${i + 1} 可领取夺宝券。`, '当前用于查看通关奖励进度。', '点击其它难度可切换详情。'],
      })),
      map: Array.from({ length: 28 }, (_, i) => ({
        id: `map_${i + 1}`,
        title: `地图等级 ${i + 1}`,
        icon: '图',
        rarity: i >= 20 ? 'ssr' : i >= 10 ? 'sr' : i >= 4 ? 'rare' : '',
        desc: [`地图等级 ${i + 1} 阶段奖励。`, '展示等级成长和领取状态。', '后续可接实际地图等级字段。'],
      })),
      community: ['收藏', '关注', '分享', '入群', '评论', '回流', '活动', '周礼', '月礼', '节日'].map((name, i) => ({ id: `community_${i}`, title: `${name}奖励`, icon: '福', rarity: i > 6 ? 'sr' : i > 2 ? 'rare' : '', desc: [`${name}行为对应的社区奖励。`, '点击后展示领取条件。', '可接社区活动状态。'] })),
      achievement: Array.from({ length: 18 }, (_, i) => ({ id: `ach_${i}`, title: `成就 ${i + 1}`, icon: '成', rarity: i > 12 ? 'ssr' : i > 6 ? 'sr' : '', desc: ['长期目标成就条目。', '可显示达成进度与奖励。', '点击后查看成就条件。'] })),
      lottery: Array.from({ length: 16 }, (_, i) => ({ id: `lottery_${i}`, title: `抽奖物品 ${i + 1}`, icon: '奖', rarity: i > 10 ? 'ssr' : i > 5 ? 'sr' : 'rare', desc: ['群抽奖奖励池物品。', '可通过口令或抽奖获得。', '点击查看奖励说明。'] })),
      test: Array.from({ length: 8 }, (_, i) => ({ id: `test_${i}`, title: `测试礼包 ${i + 1}`, icon: '测', rarity: i > 4 ? 'sr' : '', desc: ['测试大厅奖励条目。', '用于验证滚动网格点击。', '正式版可替换为活动奖励。'] })),
      fish: Array.from({ length: 26 }, (_, i) => ({ id: `fish_${i}`, title: `鱼类图鉴 ${i + 1}`, icon: '鱼', rarity: i > 18 ? 'ssr' : i > 8 ? 'sr' : 'rare', desc: ['捕鱼模式图鉴条目。', '可展示捕获次数与收益。', '点击后查看该品质说明。'] })),
    };

    function buildPoolItems(modeKey, icons, titlePrefix, descLine, baseCost) {
      return icons.map((icon, index) => ({
        id: `${modeKey}_${index}`,
        title: index < 5 ? `${titlePrefix}${index + 1}` : `${titlePrefix}物品 ${index + 1}`,
        icon,
        rarity: index > 28 ? 'ssr' : index > 20 ? 'sr' : index > 10 ? 'rare' : '',
        desc: [descLine, `兑换需要 ${baseCost + (index % 5) * 20} 积分。`, '点击兑换按钮可模拟领取反馈。'],
      }));
    }

    const chestModeList = [
      { key: 'pirates', label: '夺宝奇兵', ticket: '夺宝券', box: '宝', unlock: null, icons: ['东','南','西','北','中','发','糖','爆','肉','饭','矛','卷','球','酒','信','娃','饼','♠','♥','♦','♣','枪','盾','拳','菇','铃','喇','蟹','砖','火','灯','印','铠','灵'], titlePrefix: '奇兵', desc: '夺宝奇兵奖池物品。', cost: 80 },
      { key: 'timecity', label: '时光迷城', ticket: '时光券', box: '时', unlock: { mode: 'pirates', count: 200 }, icons: ['钟','沙','齿','镜','塔','门','钥','星','月','日','书','灯','轨','轮','芯','晶','冠','杖','袍','环','碑','羽','弦','铃','契','魂','昼','夜','界','时'], titlePrefix: '迷城', desc: '时光迷城专属奖池物品。', cost: 140 },
      { key: 'starclub', label: '星币俱乐部', ticket: '星币券', box: '星', unlock: { mode: 'timecity', count: 100 }, icons: ['星','币','杯','冠','钻','卡','票','彩','虹','云','鹰','狮','鹿','狐','猫','熊','龙','凤','鲸','蝶','花','叶','泉','羽','琴','鼓','旗','徽','章','礼'], titlePrefix: '星币', desc: '星币俱乐部专属奖池物品。', cost: 180 },
      { key: 'heaven', label: '天赋页', ticket: '天赋券', box: '天', unlock: { mode: 'starclub', count: 100 }, icons: ['天','玄','黄','宇','宙','洪','荒','日','月','盈','昃','辰','宿','列','张','寒','来','暑','往','秋','收','冬','藏','道','法','术','灵','根','悟','性'], titlePrefix: '天赋', desc: '天赋页高阶奖池物品。', cost: 220 },
    ];
    const chestModes = Object.fromEntries(chestModeList.map(mode => [mode.key, mode]));
    const poolByMode = Object.fromEntries(chestModeList.map(mode => [mode.key, buildPoolItems(mode.key, mode.icons, mode.titlePrefix, mode.desc, mode.cost)]));

    const profileRows = [
      ['玩家昵称', '螺旋炒面'], ['地图等级', '0'], ['通关次数', '0'], ['签到天数', '0'],
    ];

    const talentGroups = [
      {
        key: 'output', title: '输出系', points: 1, className: 'output',
        nodes: ['战斗天才','传奇老兵','敏锐','聪慧','破甲','专注','狂暴','强击','迅猛','精锐','勇猛战士'].map((name, index) => ({
          id: `talent_output_${index}`, name, icon: ['🗡','👹','📗','〰','🛡','🦾','🌑','⚔','🔥','📘','🛡'][index], level: index === 7 ? 1 : 0, max: index < 2 ? 3 : 6,
          desc: [`每级可获得 +${index === 7 ? 10 : 5} 攻击力。`, '任意系列天赋点达到要求后可获得。', '点击节点查看升级消耗。'],
        })),
      },
      {
        key: 'survival', title: '生存系', points: 0, className: 'survival',
        nodes: ['不灭之力','战争领主','野蛮','盛宴','骨甲','热诚','全面','护甲','坚韧','战争','无畏达人'].map((name, index) => ({
          id: `talent_survival_${index}`, name, icon: ['❓','🛡','🪓','🩸','☠','👣','🌪','🛡','🧱','🌊','👑'][index], level: 0, max: 6,
          desc: ['提升生命、防御或减伤属性。', '适合提高容错和持久作战能力。', '消耗 1 点天赋点升级。'],
        })),
      },
      {
        key: 'resource', title: '资源系', points: 0, className: 'resource',
        nodes: ['神匠契约','神木祝福','祝福','掘金','暗杀','商人','杀手','闪金','屠刀','树枝','天赋异禀'].map((name, index) => ({
          id: `talent_resource_${index}`, name, icon: ['🔥','🌳','✨','🪙','🐺','⭐','🗡','📜','🗡','🪵','🌕'][index], level: 0, max: 6,
          desc: ['提升金币、木材或额外收益。', '适合长期养成和资源循环。', '消耗 1 点天赋点升级。'],
        })),
      },
    ];

    let state = { page: 'profile', tab: 'pass', selected: null, chestView: 'draw', chestMode: 'pirates', drawCounts: { pirates: 0, timecity: 0, starclub: 0, heaven: 0 }, talent: 'talent_output_7' };
    const listRoot = document.getElementById('listRoot');
    const listCard = document.getElementById('listCard');
    const contentRoot = document.querySelector('.content');
    const resultOverlay = document.getElementById('resultOverlay');
    let lastDrawCount = 1;

    function setDetail(item, type = '详情', button = '查看奖励状态') {
      document.getElementById('detailType').textContent = type;
      document.getElementById('detailIcon').textContent = item.icon || '？';
      document.getElementById('detailIcon').className = `big-icon ${item.rarity || ''}`;
      document.getElementById('detailTitle').textContent = item.title;
      document.getElementById('detailDesc').innerHTML = (item.desc || []).join('<br />');
      document.getElementById('detailButton').textContent = button;
    }

    function itemHtml(item) {
      return `<div class="item ${item.rarity || ''} ${state.selected === item.id ? 'active' : ''}" data-item="${item.id}">
        <div class="icon">${item.icon}</div><div class="name">${item.title}</div>
      </div>`;
    }

    function isModeUnlocked(modeKey) {
      const mode = chestModes[modeKey];
      if (!mode || !mode.unlock) return true;
      return (state.drawCounts[mode.unlock.mode] || 0) >= mode.unlock.count;
    }

    function getModeUnlockText(modeKey) {
      const mode = chestModes[modeKey];
      if (!mode || !mode.unlock) return '默认开启';
      const parent = chestModes[mode.unlock.mode];
      return `${parent.label}累计 ${mode.unlock.count} 抽开启`;
    }

    function getFirstLockedMode() {
      return chestModeList.find(mode => !isModeUnlocked(mode.key));
    }

    function normalizeChestMode() {
      if (!chestModes[state.chestMode]) state.chestMode = 'pirates';
    }

    function pickDrawResult() {
      const poolItems = poolByMode[state.chestMode];
      const roll = Math.random();
      const candidates = poolItems.filter(item => {
        if (roll > .985) return item.rarity === 'ssr';
        if (roll > .91) return item.rarity === 'sr';
        if (roll > .62) return item.rarity === 'rare';
        return item.rarity === '';
      });
      const source = candidates.length > 0 ? candidates : poolItems;
      return source[Math.floor(Math.random() * source.length)];
    }

    function showDrawResult(count) {
      lastDrawCount = count;
      const mode = chestModes[state.chestMode];
      const results = Array.from({ length: count }, pickDrawResult);
      document.getElementById('resultTitle').textContent = `${mode.label} · ${count === 1 ? '单抽结果' : '十连结果'}`;
      document.getElementById('resultGrid').innerHTML = results.map(item => `<div class="result-card ${item.rarity || ''}"><div class="icon">${item.icon}</div><div class="name">${item.title}</div></div>`).join('');
      resultOverlay.classList.add('show');
    }

    function closeDrawResult() {
      resultOverlay.classList.remove('show');
    }

    function drawAndShow(count) {
      const previousLockedMode = getFirstLockedMode();
      state.drawCounts[state.chestMode] += count;
      if (previousLockedMode && isModeUnlocked(previousLockedMode.key)) {
        state.chestMode = previousLockedMode.key;
      }
      renderChest();
      showDrawResult(count);
    }

    function renderProfile() {
      listCard.classList.remove('pool-layout');
      listRoot.innerHTML = `<div class="profile-layout">
        <div class="profile-card"><div class="section-title">个人信息</div><div class="avatar"></div>${profileRows.map(([k,v]) => `<div class="row"><span>${k}</span><strong>${v}</strong></div>`).join('')}</div>
        <div class="profile-card"><div class="section-title">通关次数</div>${Array.from({length:10},(_,i)=>`<div class="row"><span>难度 ${i+1}</span><strong>0</strong></div>`).join('')}</div>
        <div class="profile-card"><div class="section-title">每日上限</div>${['夺宝券 0/8','部落响哨钥匙 0/20','神装 0/100','燃爆军团钥匙 0/20','传家宝 0/20'].map(x=>`<div class="row"><span>${x.split(' ')[0]}</span><strong>${x.split(' ')[1]}</strong></div>`).join('')}</div>
      </div>`;
      setDetail({ icon: '存', title: '我的信息', desc: ['查看玩家等级、通关次数和存档状态。', '左侧页签可切换通用存档、奖池、天赋和神装。', '此页主要展示长期数据总览。'] });
    }

    function renderUniversal() {
      listCard.classList.remove('pool-layout');
      const items = universal[state.tab];
      state.selected = state.selected && items.some(i => i.id === state.selected) ? state.selected : items[0].id;
      listRoot.innerHTML = `<div class="tabs">${tabs.map(t => `<div class="tab ${state.tab === t.key ? 'active' : ''}" data-tab="${t.key}">${t.label}</div>`).join('')}</div>
        <div class="grid-wrap"><div class="grid">${items.map(itemHtml).join('')}</div></div>`;
      setDetail(items.find(i => i.id === state.selected), '详情', '查看奖励状态');
    }

    function renderPool() {
      listCard.classList.add('pool-layout');
      normalizeChestMode();
      const poolItems = poolByMode[state.chestMode];
      const mode = chestModes[state.chestMode];
      state.selected = state.selected && poolItems.some(i => i.id === state.selected) ? state.selected : poolItems[0].id;
      const rarityGroups = [
        ['n', 'N级', poolItems.slice(0, 16)],
        ['r', 'R级', poolItems.slice(16, 28)],
        ['sr', 'SR级', poolItems.slice(28)],
      ];
      listRoot.innerHTML = `<div class="pool-header"><div class="back-button" data-chest-view="draw">返回</div>${chestModeList.map(item => `<div class="pool-chip ${state.chestMode === item.key ? 'active' : ''} ${isModeUnlocked(item.key) ? '' : 'locked'}" data-chest-mode="${item.key}">${isModeUnlocked(item.key) ? item.label : `🔒 ${item.label}`}</div>`).join('')}</div>
        <div class="grid-wrap" style="height:calc(100% - 44px)">${rarityGroups.map(([key, label, items]) => `<div class="rarity-block"><div class="rarity-title ${key}">${label}</div><div class="rarity-grid">${items.map(itemHtml).join('')}</div></div>`).join('')}</div>`;
      const item = poolItems.find(i => i.id === state.selected);
      setDetail({ ...item, desc: [...item.desc, `当前拥有：${item.id.endsWith('0') ? 1 : 0}`, `${mode.label}积分：${state.drawCounts[state.chestMode] * 10}`] }, '奖池详情', '兑换');
    }

    function renderProbability() {
      listCard.classList.remove('pool-layout');
      const mode = chestModes[state.chestMode];
      listRoot.innerHTML = `<div class="pool-header"><div class="back-button" data-chest-view="draw">返回</div><div class="pool-chip">概率公示</div></div>
        <div class="profile-layout" style="grid-template-columns:1fr 1fr; height:calc(100% - 44px)">
          <div class="profile-card"><div class="section-title">基础概率</div>
            <div class="row"><span>N级</span><strong>70%</strong></div>
            <div class="row"><span>R级</span><strong>24%</strong></div>
            <div class="row"><span>SR级</span><strong>5%</strong></div>
            <div class="row"><span>SSR级</span><strong>1%</strong></div>
          </div>
          <div class="profile-card"><div class="section-title">累计奖励</div>
            <div class="row"><span>累计抽奖 50 次</span><strong>奖励</strong></div>
            <div class="row"><span>累计抽奖 75 次</span><strong>奖励</strong></div>
            <div class="row"><span>累计抽奖 100 次</span><strong>奖励</strong></div>
            <div class="row"><span>每 10 抽</span><strong>星币</strong></div>
          </div>
        </div>`;
      setDetail({ icon: '%', title: `${mode.label}概率公示`, desc: ['展示当前奖池品质概率。', '右侧累计奖励与宝箱页保持一致。', '点击返回可回到抽奖主界面。'] }, '概率详情', '返回抽奖');
    }

    function renderChest() {
      listCard.classList.remove('pool-layout');
      normalizeChestMode();
      const mode = chestModes[state.chestMode];
      const nextLockedMode = getFirstLockedMode();
      const currentUnlocked = isModeUnlocked(state.chestMode);
      const currentUnlockText = currentUnlocked ? '当前奖池已开启。' : `${getModeUnlockText(state.chestMode)}，当前为预览模式。`;
      listRoot.innerHTML = `<div class="chest-layout">
        <div class="chest-mode-list">
          <div class="chest-title">${mode.label}宝箱</div>
          <div class="mode-tabs">
            ${chestModeList.map(item => `<div class="mode-tab ${state.chestMode === item.key ? 'active' : ''} ${isModeUnlocked(item.key) ? '' : 'locked'}" data-chest-mode="${item.key}">${isModeUnlocked(item.key) ? item.label : `🔒 ${item.label}`}</div>`).join('')}
          </div>
          <div class="utility-links">
            <div class="utility-link" data-chest-view="pool">奖池</div>
            <div class="utility-link" data-chest-view="prob">概率</div>
          </div>
        </div>
          <div class="chest-stage">
          ${currentUnlocked ? (nextLockedMode ? `<div class="unlock-banner">${nextLockedMode.label} ${state.drawCounts[nextLockedMode.unlock.mode] || 0}/${nextLockedMode.unlock.count} 抽后开启</div>` : `<div class="unlock-banner">全部奖池已开启</div>`) : `<div class="unlock-banner">预览中：${getModeUnlockText(state.chestMode)}</div>`}
            <div class="altar"><div class="glow"></div><div class="chest-box" data-draw="1"></div></div>
            <div class="reward-strip">
              ${poolByMode[state.chestMode].slice(0, 5).map(item => `<div class="mini-reward">${item.icon}</div>`).join('')}
            </div>
          </div>
          <div class="chest-actions">
            <div class="draw-button" data-draw="1">抽 1 次</div>
            <div class="draw-button" data-draw="10">抽 10 次</div>
          </div>
      </div>`;
      setDetail({ icon: mode.box, title: mode.label, desc: [`${mode.ticket}：${state.chestMode === 'pirates' ? 11 : 3}`, `${mode.label}积分：${state.drawCounts[state.chestMode] * 10}`, `${mode.label}累计次数：${state.drawCounts[state.chestMode]}`, currentUnlockText, '点击宝箱或下方按钮可模拟抽奖。'] }, currentUnlocked ? '夺宝详情' : '奖池预览', nextLockedMode ? `预览${nextLockedMode.unlock.count}抽解锁` : '模拟抽 1 次');
    }

    function renderPlaceholder(title, icon) {
      listCard.classList.remove('pool-layout');
      listRoot.innerHTML = `<div class="empty-page">${title} 页面布局待接入，可复用当前网格组件。</div>`;
      setDetail({ icon, title, desc: ['该页暂作为结构预留。', '后续可以接同一套网格和详情交互。', '点击左侧其它页签继续预览。'] });
    }

    function getSelectedTalent() {
      for (const group of talentGroups) {
        const node = group.nodes.find(item => item.id === state.talent);
        if (node) return { group, node };
      }
      return { group: talentGroups[0], node: talentGroups[0].nodes[0] };
    }

    function renderTalent() {
      listCard.classList.remove('pool-layout');
      const rowPattern = [2, 3, 2, 3];
      const renderTalentRows = nodes => {
        let cursor = 0;
        const rows = rowPattern.map(count => {
          const row = nodes.slice(cursor, cursor + count);
          cursor += count;
          return `<div class="talent-row">${row.map(node => `<div class="talent-node ${state.talent === node.id ? 'active' : ''} ${node.level > 0 ? 'learned' : ''}" data-talent="${node.id}">
            <div class="node-icon">${node.icon}</div><div class="node-level">${node.level}/${node.max}</div><div class="talent-node-name">${node.name}</div>
          </div>`).join('')}</div>`;
        });
        const rest = nodes.slice(cursor);
        if (rest.length > 0) {
          rows.push(`<div class="talent-row final">${rest.map(node => `<div class="talent-node ${state.talent === node.id ? 'active' : ''} ${node.level > 0 ? 'learned' : ''}" data-talent="${node.id}">
            <div class="node-icon">${node.icon}</div><div class="node-level">${node.level}/${node.max}</div><div class="talent-node-name">${node.name}</div>
          </div>`).join('')}</div>`);
        }
        return rows.join('');
      };
      listRoot.innerHTML = `<div class="talent-layout">${talentGroups.map(group => `<div class="talent-column ${group.className}">
        <div class="talent-nodes">${renderTalentRows(group.nodes)}</div>
        <div class="talent-footer"><span>${group.title}</span><strong>${group.points}</strong><span>点</span></div>
      </div>`).join('')}</div>`;
      const { group, node } = getSelectedTalent();
      setDetail({ icon: node.icon, title: node.name, desc: [`天赋点：${group.points}`, `${node.level}/${node.max}`, '[详情效果]', ...node.desc, '[兑换消耗] 1点天赋点'] }, '天赋详情', node.level < node.max ? '升级天赋' : '已满级');
    }

    function upgradeSelectedTalent() {
      const { group, node } = getSelectedTalent();
      if (node.level >= node.max) {
        setDetail({ icon: node.icon, title: node.name, desc: [`${node.name} 已满级。`, '请选择其它天赋节点。'] }, '天赋详情', '已满级');
        return;
      }
      if (group.points <= 0) {
        setDetail({ icon: node.icon, title: node.name, desc: ['天赋点不足。', '当前只是 HTML 预览，可后续接真实存档点数。', '[兑换消耗] 1点天赋点'] }, '天赋详情', '天赋点不足');
        return;
      }
      group.points -= 1;
      node.level += 1;
      renderTalent();
    }

    function render() {
      document.querySelectorAll('.side-tab').forEach(tab => tab.classList.toggle('active', tab.dataset.page === state.page));
      contentRoot.classList.toggle('talent-content', state.page === 'talent');
      if (state.page === 'profile') renderProfile();
      else if (state.page === 'universal') renderUniversal();
      else if (state.page === 'pool') {
        if (state.chestView === 'pool') renderPool();
        else if (state.chestView === 'prob') renderProbability();
        else renderChest();
      }
      else if (state.page === 'talent') renderTalent();
      else if (state.page === 'equipment') renderPlaceholder('神装', '装');
    }

    document.querySelector('.sidebar').addEventListener('click', event => {
      const tab = event.target.closest('.side-tab');
      if (!tab || tab.classList.contains('disabled')) return;
      state.page = tab.dataset.page;
      state.selected = null;
      render();
    });

    listRoot.addEventListener('click', event => {
      const tab = event.target.closest('.tab');
      if (tab) {
        state.tab = tab.dataset.tab;
        state.selected = null;
        renderUniversal();
        return;
      }
      const chestView = event.target.closest('[data-chest-view]');
      if (chestView) {
        state.chestView = chestView.dataset.chestView;
        state.selected = null;
        render();
        return;
      }
      const chestMode = event.target.closest('[data-chest-mode]');
      if (chestMode) {
        const targetMode = chestMode.dataset.chestMode;
        state.chestMode = targetMode;
        state.chestView = 'draw';
        state.selected = null;
        render();
        return;
      }
      const draw = event.target.closest('[data-draw]');
      if (draw) {
        const count = Number(draw.dataset.draw || 1);
        drawAndShow(count);
        return;
      }
      const talentNode = event.target.closest('[data-talent]');
      if (talentNode) {
        state.talent = talentNode.dataset.talent;
        renderTalent();
        return;
      }
      const item = event.target.closest('.item');
      if (!item) return;
      state.selected = item.dataset.item;
      render();
    });

    document.getElementById('detailButton').addEventListener('click', () => {
      if (state.page === 'pool' && state.chestView === 'draw') {
        const lockedMode = getFirstLockedMode();
        if (lockedMode) {
          state.drawCounts[lockedMode.unlock.mode] = lockedMode.unlock.count;
          state.chestMode = lockedMode.key;
          renderChest();
          return;
        }
        state.drawCounts[state.chestMode] += 1;
        renderChest();
        return;
      }
      if (state.page === 'talent') {
        upgradeSelectedTalent();
        return;
      }
      if (state.page === 'pool' && state.chestView === 'prob') {
        state.chestView = 'draw';
        render();
        return;
      }
      const text = state.page === 'pool' && state.chestView === 'pool' ? `已模拟兑换${chestModes[state.chestMode].label}物品。` : '已模拟查看当前奖励状态。';
      document.getElementById('detailDesc').innerHTML += `<br /><span style="color:#ffd04a">${text}</span>`;
    });

    document.getElementById('resultClose').addEventListener('click', closeDrawResult);
    document.getElementById('resultConfirm').addEventListener('click', closeDrawResult);
    document.getElementById('resultAgain').addEventListener('click', () => {
      closeDrawResult();
      drawAndShow(lastDrawCount);
    });
    resultOverlay.addEventListener('click', event => {
      if (event.target === resultOverlay) closeDrawResult();
    });

    render();
  </script>
</body>
</html>
