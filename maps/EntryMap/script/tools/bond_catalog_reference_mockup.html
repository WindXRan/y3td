<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>卡牌图鉴</title>
  <style>
    :root {
      --bg-0: #05070b;
      --bg-1: #0b1018;
      --bg-2: #111822;
      --panel: #10161f;
      --panel-2: #171d27;
      --line: #2c3645;
      --line-2: #485566;
      --text: #eef4ff;
      --text-2: #b7c2d4;
      --text-3: #8f9db1;
      --gold: #ffd800;
      --gold-2: #d29d1a;
      --blue: #3898ea;
      --blue-dark: #215ca0;
      --purple: #a93ef0;
      --green: #41df54;
      --red: #ff4a64;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at 16% 10%, rgba(40, 106, 203, .16), transparent 18%),
        radial-gradient(circle at 80% 10%, rgba(214, 166, 57, .14), transparent 16%),
        linear-gradient(135deg, #040509 0%, #0a1018 48%, #040509 100%);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .16;
      background:
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.96), rgba(0,0,0,.16));
    }

    .shell {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(910px, calc(100vw - 12px));
      height: min(694px, calc(100vh - 12px));
      transform: translate(-50%, -50%);
      display: grid;
      grid-template-columns: 402px minmax(0, 1fr);
      background: linear-gradient(180deg, rgba(12, 16, 24, .97), rgba(7, 9, 14, .99));
      border: 1px solid rgba(255,255,255,.10);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 22px 54px rgba(0,0,0,.56);
      overflow: hidden;
    }

    .left {
      position: relative;
      padding: 14px 14px 12px 16px;
      background:
        linear-gradient(180deg, rgba(10, 13, 20, .98), rgba(13, 17, 25, .96)),
        linear-gradient(180deg, rgba(46, 114, 197, .05), transparent 20%);
      border-right: 1px solid rgba(255,255,255,.06);
    }

    .title {
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 0;
      text-shadow: 0 2px 0 rgba(43, 28, 4, .78);
    }

    .title::after {
      content: "";
      display: block;
      width: 90px;
      height: 4px;
      margin-top: 8px;
      background: linear-gradient(90deg, #d3a01c, rgba(255,255,255,0));
      border-radius: 999px;
    }

    .top-row {
      margin: 0 0 11px 92px;
      font-size: 16px;
      line-height: 1;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
    }

    .top-row .num {
      color: var(--gold);
      font-size: 18px;
      margin-left: 2px;
    }

    .section-label {
      margin: 8px 0 8px;
      font-size: 14px;
      line-height: 1;
      font-weight: 700;
      color: #6fa7d7;
      letter-spacing: 0;
    }

    .section-label.gold { color: #b89544; }

    .deck-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px 10px;
      margin-bottom: 12px;
    }

    .deck-btn {
      appearance: none;
      border: 1px solid rgba(45, 146, 232, .95);
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 0 11px;
      color: #ffffff;
      font-size: 14px;
      line-height: 1;
      font-weight: 700;
      background:
        linear-gradient(180deg, #2c9ce9 0%, #277bcd 52%, #1e5ba5 100%);
      clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 8px 100%, 0 50%);
      box-shadow:
        0 1px 0 rgba(255,255,255,.12) inset,
        0 2px 10px rgba(0,0,0,.20);
      cursor: default;
      white-space: nowrap;
    }

    .deck-btn.active {
      border-color: rgba(255, 215, 56, .95);
      background:
        linear-gradient(180deg, #f0ba31 0%, #dea11c 55%, #bc820f 100%);
    }

    .deck-btn.empty {
      background:
        linear-gradient(180deg, #2d9be8 0%, #2475cb 52%, #1a5ea9 100%);
    }

    .deck-btn .count {
      margin-left: 1px;
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,.95);
    }

    .right {
      min-width: 0;
      display: grid;
      grid-template-rows: 372px minmax(0, 1fr);
      gap: 12px;
      padding: 12px 12px 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), transparent 20%),
        linear-gradient(180deg, rgba(9, 11, 16, .98), rgba(12, 15, 21, .98));
    }

    .slots {
      min-width: 0;
      padding: 14px 13px 12px;
      background: rgba(7, 9, 14, .42);
      border: 1px solid rgba(255,255,255,.04);
    }

    .slot-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      grid-template-rows: repeat(4, auto);
      gap: 8px;
      min-height: 0;
      align-content: start;
    }

    .slot-row {
      display: contents;
    }

    .slot {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1px solid #3a4657;
      background:
        radial-gradient(circle at 50% 42%, rgba(90, 128, 209, .10), transparent 30%),
        linear-gradient(180deg, rgba(20, 24, 33, .98), rgba(13, 15, 22, .98));
      box-shadow: 0 0 0 1px rgba(0,0,0,.34) inset;
      overflow: hidden;
    }

    .slot.filled.blue { border-color: #2c7ed4; }
    .slot.filled.purple { border-color: #ae37eb; }

    .slot.filled::before {
      content: "";
      position: absolute;
      inset: 7px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.10), transparent 58%),
        linear-gradient(135deg, rgba(255,255,255,.08), transparent 36%);
      opacity: .9;
    }

    .slot.filled::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.03), transparent 28%),
        linear-gradient(315deg, rgba(255,255,255,.05), transparent 26%);
      pointer-events: none;
    }

    .slot .art {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,.88);
      font-size: 28px;
      text-shadow: 0 1px 0 rgba(0,0,0,.55);
      pointer-events: none;
    }

    .slot .art.one { background: radial-gradient(circle at 40% 40%, rgba(96, 170, 255, .28), transparent 38%); }
    .slot .art.two { background: radial-gradient(circle at 60% 46%, rgba(120, 180, 255, .22), transparent 38%); }
    .slot .art.three { background: radial-gradient(circle at 50% 54%, rgba(80, 215, 255, .20), transparent 35%); }
    .slot .art.four { background: radial-gradient(circle at 52% 50%, rgba(120, 140, 255, .18), transparent 36%); }
    .slot .art.five { background: radial-gradient(circle at 50% 50%, rgba(186, 92, 255, .28), transparent 38%); }

    .slot.empty {
      background:
        radial-gradient(circle at 50% 42%, rgba(0,0,0,.14), transparent 18%),
        linear-gradient(180deg, rgba(18, 20, 27, .98), rgba(12, 14, 20, .98));
    }

    .slot.empty::before {
      content: "";
      position: absolute;
      inset: 8px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.02), rgba(255,255,255,.01) 40%, rgba(0,0,0,.07) 78%),
        linear-gradient(135deg, rgba(255,255,255,.02), rgba(255,255,255,.05));
      -webkit-mask:
        linear-gradient(135deg, transparent 36%, #000 36% 64%, transparent 64%) center/100% 100% no-repeat;
      mask:
        linear-gradient(135deg, transparent 36%, #000 36% 64%, transparent 64%) center/100% 100% no-repeat;
    }

    .detail {
      padding: 12px 16px 11px;
      background:
        linear-gradient(180deg, rgba(22, 26, 35, .98), rgba(13, 16, 22, .98));
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: 0 0 0 1px rgba(255,255,255,.03) inset;
    }

    .detail-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 900;
      color: #d54dff;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .detail-title .gold { color: var(--gold); }
    .detail-title .gray { color: #c9c9c9; }

    .detail-sub {
      margin-top: 6px;
      color: #d6d6d6;
      font-size: 14px;
      line-height: 1.35;
      white-space: nowrap;
    }

    .detail-box {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.05);
      font-size: 16px;
      line-height: 1.38;
      letter-spacing: 0;
      color: var(--text);
      white-space: pre-wrap;
    }

    .green { color: var(--green); font-weight: 700; }
    .red { color: var(--red); font-weight: 700; }
    .gold { color: var(--gold); font-weight: 700; }

    .close {
      position: absolute;
      right: 3px;
      top: 2px;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      color: #f7b21a;
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 1px 0 rgba(0,0,0,.7);
      pointer-events: none;
    }

    .close::before {
      content: "×";
      transform: translateY(-2px);
    }

    @media (max-width: 920px) {
      body { overflow: auto; }
      .shell {
        position: static;
        transform: none;
        width: auto;
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }
      .right { grid-template-rows: 290px minmax(0, 1fr); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="left">
      <div class="title">卡牌图鉴</div>
      <div class="top-row">本局已吞：<span class="num">0</span></div>

      <div class="section-label">职业卡组：</div>
      <div class="deck-grid">
        <button class="deck-btn active">神射手<span class="count">(0/5)</span></button>
        <button class="deck-btn">游侠<span class="count">(0/5)</span></button>
        <button class="deck-btn">枪炮师<span class="count">(0/5)</span></button>
        <button class="deck-btn">猎人<span class="count">(0/5)</span></button>
        <button class="deck-btn">刀锋战士<span class="count">(0/5)</span></button>
        <button class="deck-btn">魔剑士<span class="count">(0/5)</span></button>
        <button class="deck-btn">狂战士<span class="count">(0/5)</span></button>
        <button class="deck-btn">剑魂<span class="count">(0/5)</span></button>
        <button class="deck-btn">骷髅法师<span class="count">(0/5)</span></button>
        <button class="deck-btn">剑宗<span class="count">(0/5)</span></button>
        <button class="deck-btn">龙骑士<span class="count">(0/5)</span></button>
        <button class="deck-btn">雷电法王<span class="count">(0/5)</span></button>
        <button class="deck-btn">火法师<span class="count">(0/5)</span></button>
        <button class="deck-btn">冰霜法师<span class="count">(0/5)</span></button>
        <button class="deck-btn">战斗法师<span class="count">(0/5)</span></button>
        <button class="deck-btn">全能骑士<span class="count">(0/5)</span></button>
      </div>

      <div class="section-label gold">特殊卡组：</div>
      <div class="deck-grid">
        <button class="deck-btn empty">新兵套<span class="count">(0/3)</span></button>
        <button class="deck-btn empty">炼金术<span class="count">(0/3)</span></button>
        <button class="deck-btn empty">王牌<span class="count">(0/5)</span></button>
        <button class="deck-btn empty">异火<span class="count">(0/10)</span></button>
        <button class="deck-btn empty">赌神<span class="count">(0/5)</span></button>
        <button class="deck-btn empty">狩猎达人<span class="count">(0/3)</span></button>
        <button class="deck-btn empty">小成箭术<span class="count">(0/3)</span></button>
        <button class="deck-btn empty">大成箭术<span class="count">(0/5)</span></button>
        <button class="deck-btn empty">龙珠<span class="count">(0/7)</span></button>
        <button class="deck-btn empty">凡人修仙<span class="count">(0/10)</span></button>
        <button class="deck-btn empty">爆战兔<span class="count">(0/3)</span></button>
        <button class="deck-btn empty">证帝<span class="count">(0/10)</span></button>
        <button class="deck-btn empty">雀魂麻将<span class="count">(0/8)</span></button>
        <button class="deck-btn empty">作者宝库<span class="count">(0/10)</span></button>
        <button class="deck-btn empty">绝学<span class="count">(0/9)</span></button>
        <button class="deck-btn empty">诛仙剑阵<span class="count">(0/5)</span></button>
        <button class="deck-btn empty">超能果实<span class="count">(0/6)</span></button>
        <button class="deck-btn empty">盲盒<span class="count">(0/5)</span></button>
      </div>
    </aside>

    <main class="right">
      <div class="slots">
        <div class="slot-grid">
          <div class="slot filled blue"><div class="art one">▲</div></div>
          <div class="slot filled blue"><div class="art two">◈</div></div>
          <div class="slot filled blue"><div class="art three">◌</div></div>
          <div class="slot filled blue"><div class="art four">◔</div></div>
          <div class="slot filled purple"><div class="art five">✦</div></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
          <div class="slot empty"></div>
        </div>
      </div>

      <section class="detail">
        <h2 class="detail-title">神射手<span class="gold">·特效&gt;</span>（<span class="gray">未激活</span>）</h2>
        <div class="detail-sub">（吞噬所有本羁绊卡牌，可激活此特效）</div>
        <div class="detail-box">攻击<span class="green">8%</span>概率释放1根破空箭，对命中敌人造
成<span class="green">攻击力x200%+攻击速度x50%</span>的<span class="red">物理伤</span>
<span class="red">害</span></div>
      </section>
    </main>

    <div class="close"></div>
  </div>
</body>
</html>
