<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>羁绊图鉴</title>
  <style>
    :root {
      --bg-0: #05070b;
      --bg-1: #090d14;
      --bg-2: #101621;
      --panel-0: #111722;
      --panel-1: #171f2c;
      --panel-2: #1d2736;
      --line-0: #2b3647;
      --line-1: #506179;
      --text-0: #eef4ff;
      --text-1: #c8d2e6;
      --text-2: #94a2b8;
      --gold-0: #ffd800;
      --gold-1: #d0a11e;
      --gold-2: #87611b;
      --rare: #3e8fe6;
      --epic: #af43ef;
      --legendary: #f1bf43;
      --green: #49df4a;
      --blue: #6dbbff;
      --purple: #d06aff;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif;
      color: var(--text-0);
      background:
        radial-gradient(circle at 18% 18%, rgba(66, 120, 214, .16), transparent 20%),
        radial-gradient(circle at 80% 16%, rgba(237, 181, 55, .18), transparent 18%),
        radial-gradient(circle at 50% 80%, rgba(81, 190, 103, .10), transparent 20%),
        linear-gradient(135deg, #05070b 0%, #0b111b 42%, #040509 100%);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .18;
      background:
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.2));
    }
    .shell {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(1260px, calc(100vw - 34px));
      height: min(780px, calc(100vh - 34px));
      transform: translate(-50%, -50%);
      display: grid;
      grid-template-columns: 354px minmax(0, 1fr);
      background: linear-gradient(180deg, rgba(13, 17, 25, .96), rgba(7, 10, 15, .98));
      border: 1px solid rgba(119, 180, 255, .12);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 24px 72px rgba(0,0,0,.5);
      overflow: hidden;
    }
    .sidebar {
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 18px 14px 16px 14px;
      background:
        linear-gradient(180deg, rgba(10,13,20,.98), rgba(15,19,28,.97)),
        linear-gradient(180deg, rgba(210, 168, 53, .08), transparent 20%);
      border-right: 1px solid rgba(255,255,255,.06);
    }
    .sidebar .brand {
      font-size: 34px;
      line-height: 1;
      letter-spacing: 0;
      color: var(--gold-0);
      margin-bottom: 10px;
      text-shadow: 0 2px 0 rgba(43, 28, 4, .65);
    }
    .sidebar .brand::after {
      content: "";
      display: block;
      width: 90px;
      height: 4px;
      margin-top: 10px;
      background: linear-gradient(90deg, var(--gold-1), rgba(255,255,255,0));
      border-radius: 999px;
    }
    .sidebar .hint {
      margin: 0 0 14px;
      color: var(--text-2);
      font-size: 12px;
      line-height: 1.7;
    }
    .nav {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px 10px;
      align-content: start;
    }
    .nav button {
      appearance: none;
      border: 0;
      padding: 0;
      text-align: left;
      background: transparent;
      color: var(--text-1);
      cursor: pointer;
      font: inherit;
      letter-spacing: 0;
    }
    .nav-item {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 8px;
      border-radius: 4px;
      border: 1px solid rgba(74, 142, 216, .72);
      background: linear-gradient(180deg, rgba(29, 103, 185, .92), rgba(18, 70, 136, .96));
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 4px 12px rgba(0,0,0,.18);
      transition: transform .12s ease, filter .12s ease, border-color .12s ease;
    }
    .nav-item:hover { transform: translateY(-1px); filter: brightness(1.08); }
    .nav-item.active {
      background: linear-gradient(180deg, rgba(255, 221, 72, .95), rgba(214, 158, 32, .98));
      border-color: rgba(255, 233, 148, .95);
      color: #fff;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.12) inset,
        0 8px 16px rgba(0,0,0,.22);
    }
    .nav-item .key {
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 12px;
      flex: 0 0 auto;
    }
    .nav-item .label {
      min-width: 0;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-foot {
      margin-top: auto;
      padding-top: 14px;
      display: grid;
      gap: 8px;
      color: var(--text-2);
      font-size: 12px;
      line-height: 1.6;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .nav-foot strong {
      color: var(--gold-0);
      font-weight: 500;
    }
    .workspace {
      min-width: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) 258px;
      gap: 12px;
      padding: 12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), transparent 20%),
        linear-gradient(180deg, rgba(8,10,14,.96), rgba(10,12,18,.98));
    }
    .catalog {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 10px;
      padding: 10px 12px 12px;
      background: linear-gradient(180deg, rgba(15, 19, 28, .98), rgba(11, 14, 20, .98));
      border: 1px solid rgba(255,255,255,.05);
      box-shadow: 0 0 0 1px rgba(255,255,255,.03) inset;
      overflow: hidden;
    }
    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      padding: 4px 2px 0;
    }
    .title-block h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1;
      color: var(--gold-0);
      text-shadow: 0 2px 0 rgba(43, 28, 4, .6);
    }
    .title-block .sub {
      margin-top: 8px;
      color: var(--text-2);
      font-size: 13px;
      line-height: 1.6;
    }
    .stats {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(92px, 1fr);
      gap: 8px;
      align-items: stretch;
    }
    .stat {
      min-width: 0;
      padding: 9px 10px 8px;
      background: linear-gradient(180deg, rgba(33, 40, 54, .9), rgba(18, 23, 33, .96));
      border: 1px solid rgba(255,255,255,.05);
      box-shadow: 0 1px 0 rgba(255,255,255,.04) inset;
    }
    .stat .k {
      color: var(--text-2);
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
    }
    .stat .v {
      margin-top: 6px;
      color: var(--text-0);
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 2px 0 0;
    }
    .filter {
      height: 30px;
      padding: 0 11px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(75, 142, 218, .34);
      background: linear-gradient(180deg, rgba(29, 41, 58, .95), rgba(18, 25, 36, .98));
      color: var(--text-1);
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      white-space: nowrap;
      font-size: 13px;
    }
    .filter:hover { transform: translateY(-1px); }
    .filter.active {
      background: linear-gradient(180deg, rgba(255, 219, 90, .96), rgba(209, 145, 31, .98));
      color: white;
      border-color: rgba(255, 230, 146, .75);
    }
    .filter .count {
      padding: 0 6px;
      min-width: 22px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: var(--gold-0);
      font-size: 11px;
    }
    .filter.active .count {
      background: rgba(255,255,255,.16);
      color: white;
    }
    .grid-shell {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
      padding-top: 4px;
      overflow: hidden;
    }
    .line-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 32px;
    }
    .line-pill {
      height: 28px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      border-radius: 4px;
      border: 1px solid rgba(75, 142, 218, .34);
      background: linear-gradient(180deg, rgba(29, 41, 58, .95), rgba(18, 25, 36, .98));
      color: var(--text-1);
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .line-pill:hover { transform: translateY(-1px); filter: brightness(1.06); }
    .line-pill.active {
      background: linear-gradient(180deg, rgba(255, 219, 90, .96), rgba(209, 145, 31, .98));
      color: white;
      border-color: rgba(255, 230, 146, .75);
    }
    .line-pill .count {
      min-width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      padding: 0 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      color: var(--gold-0);
      font-size: 10px;
    }
    .grid-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--text-2);
      font-size: 12px;
      line-height: 1.5;
    }
    .legend {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }
    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.rare { background: var(--rare); }
    .dot.epic { background: var(--epic); }
    .dot.legendary { background: var(--legendary); }
    .grid {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-content: start;
      overflow: hidden;
    }
    .card {
      position: relative;
      aspect-ratio: 1 / 1;
      min-width: 0;
      min-height: 0;
      border: 1px solid rgba(70, 110, 157, .52);
      background:
        radial-gradient(circle at 50% 28%, rgba(116, 159, 237, .16), transparent 28%),
        linear-gradient(180deg, rgba(24, 30, 43, .98), rgba(15, 19, 27, .98));
      box-shadow:
        0 0 0 1px rgba(0,0,0,.34) inset,
        0 8px 14px rgba(0,0,0,.18);
      cursor: pointer;
      user-select: none;
      overflow: hidden;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
    }
    .card:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 214, 107, .48);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 10px 18px rgba(0,0,0,.22);
    }
    .card.active {
      border-color: rgba(255, 221, 128, .96);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.1) inset,
        0 0 0 2px rgba(255, 216, 107, .14),
        0 12px 20px rgba(0,0,0,.26);
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.06), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 36%);
      pointer-events: none;
    }
    .card .band {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 4px;
    }
    .card.rare .band { background: var(--rare); }
    .card.epic .band { background: var(--epic); }
    .card.legendary .band { background: var(--legendary); }
    .card .glyph {
      position: absolute;
      left: 50%;
      top: 12px;
      transform: translateX(-50%);
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(8, 12, 18, .7);
      color: var(--gold-0);
      font-size: 20px;
      font-weight: 700;
    }
    .card .title {
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: 18px;
      color: var(--text-0);
      text-align: center;
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card .meta {
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: 2px;
      color: var(--text-2);
      text-align: center;
      font-size: 10px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card .chip {
      position: absolute;
      right: 4px;
      top: 4px;
      min-width: 20px;
      height: 16px;
      display: grid;
      place-items: center;
      padding: 0 4px;
      background: rgba(10, 13, 18, .76);
      border: 1px solid rgba(255,255,255,.06);
      color: var(--gold-0);
      font-size: 10px;
      border-radius: 999px;
    }
    .card .selected {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255, 219, 117, .58);
      background: rgba(255, 219, 117, .08);
      display: none;
    }
    .card.active .selected { display: block; }
    .card.empty-slot {
      border-color: rgba(72, 80, 98, .72);
      background:
        linear-gradient(180deg, rgba(17, 22, 31, .98), rgba(12, 15, 21, .98));
      opacity: .92;
      cursor: default;
    }
    .card.empty-slot .glyph {
      color: var(--text-2);
      background: rgba(255,255,255,.04);
    }
    .card.empty-slot .title {
      color: var(--text-2);
    }
    .card.empty-slot .meta {
      color: rgba(148, 162, 184, .72);
    }
    .detail {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      gap: 10px;
      padding: 12px;
      background: linear-gradient(180deg, rgba(15, 19, 28, .98), rgba(9, 12, 18, .98));
      border: 1px solid rgba(255,255,255,.05);
      box-shadow: 0 0 0 1px rgba(255,255,255,.03) inset;
      overflow: hidden;
    }
    .detail-head {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }
    .detail-icon {
      position: relative;
      width: 88px;
      height: 88px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(41, 51, 67, .96), rgba(18, 22, 31, .98));
      box-shadow: 0 0 0 1px rgba(0,0,0,.3) inset;
    }
    .detail-icon .badge {
      position: absolute;
      inset: 10px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: rgba(246, 201, 101, .14);
      color: var(--gold-0);
      font-size: 40px;
      font-weight: 700;
    }
    .detail-title {
      min-width: 0;
    }
    .detail-title h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.08;
      color: var(--text-0);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .detail-title .sub {
      margin-top: 8px;
      color: var(--text-2);
      font-size: 12px;
      line-height: 1.7;
    }
    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .pill {
      height: 24px;
      display: inline-flex;
      align-items: center;
      padding: 0 9px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.06);
      color: var(--text-1);
      font-size: 11px;
      white-space: nowrap;
    }
    .pill.gold { color: var(--gold-0); border-color: rgba(255, 209, 123, .18); background: rgba(255, 209, 123, .06); }
    .pill.rare { color: #b7d7ff; border-color: rgba(77, 143, 217, .18); background: rgba(77, 143, 217, .06); }
    .pill.epic { color: #e3c2ff; border-color: rgba(154, 83, 223, .18); background: rgba(154, 83, 223, .06); }
    .pill.legendary { color: #ffe5aa; border-color: rgba(224, 178, 67, .18); background: rgba(224, 178, 67, .06); }
    .block {
      min-width: 0;
      padding: 10px 12px;
      background: linear-gradient(180deg, rgba(31, 38, 52, .92), rgba(16, 20, 29, .96));
      border: 1px solid rgba(255,255,255,.06);
    }
    .block .k {
      color: var(--gold-0);
      font-size: 12px;
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .block .v {
      color: var(--text-1);
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .block .v .pos { color: var(--green); font-weight: 700; }
    .block .v .gold { color: var(--gold-0); font-weight: 700; }
    .block .v .purple { color: var(--purple); font-weight: 700; }
    .block.small .v {
      line-height: 1.6;
    }
    .detail-footer {
      display: grid;
      gap: 8px;
    }
    .action {
      height: 38px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, var(--gold-0), var(--gold-1));
      color: white;
      border: 1px solid rgba(255, 232, 161, .42);
      cursor: pointer;
      user-select: none;
      font-size: 15px;
      letter-spacing: 0;
      box-shadow: 0 8px 18px rgba(193, 141, 38, .18);
    }
    .action.secondary {
      background: linear-gradient(180deg, #3b4353, #2a3140);
      border-color: rgba(255,255,255,.05);
      box-shadow: none;
      color: var(--text-1);
    }
    .detail-panel-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 164px;
      gap: 10px;
      align-items: start;
    }
    .action-stack {
      display: grid;
      gap: 8px;
    }
    .footer-note {
      color: var(--text-2);
      font-size: 12px;
      line-height: 1.6;
      margin: 0;
    }
    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--text-2);
      font-size: 14px;
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }
    @media (max-width: 1200px) {
      body { overflow: auto; }
      .shell {
        position: static;
        transform: none;
        width: auto;
        height: auto;
        min-height: 100vh;
        grid-template-columns: 180px minmax(0, 1fr);
      }
      .workspace {
        grid-template-rows: minmax(0, 1fr) 240px;
      }
      .grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-template-rows: repeat(4, minmax(0, 1fr));
      }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .workspace { grid-template-rows: minmax(520px, 1fr) auto; }
      .nav { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: repeat(5, minmax(0, 1fr));
      }
      .stats { grid-auto-flow: row; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .detail-panel-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">羁绊图鉴</div>
      <div class="hint">传统卡册版 · 左侧按大类切换，右侧固定 15 格槽位，卡组开启与未开启都在槽位里体现。</div>
      <nav class="nav" id="nav"></nav>
      <div class="nav-foot">
        <div>收录节点 <strong id="navTotal">0</strong></div>
        <div>主线根节点 <strong id="navRoots">0</strong></div>
        <div>品质层级 <strong id="navQuality">0</strong></div>
      </div>
    </aside>
    <main class="workspace">
      <section class="catalog">
        <div class="hero">
          <div class="title-block">
            <h1>羁绊图鉴</h1>
            <div class="sub">右侧固定 15 格，不再放“选卡组”入口；未开启的卡组只占锁定槽位。</div>
          </div>
          <div class="stats" id="stats"></div>
        </div>
        <div class="filters" id="filters"></div>
        <div class="grid-shell">
          <div class="line-strip" id="lineStrip"></div>
          <div class="grid-head">
            <div class="legend">
              <span><i class="dot rare"></i>稀有</span>
              <span><i class="dot epic"></i>史诗</span>
              <span><i class="dot legendary"></i>传说</span>
            </div>
            <div id="gridHint">点击右侧任一槽位查看说明</div>
          </div>
          <div class="grid" id="grid"></div>
        </div>
      </section>

    function cleanText(value) {
      return String(value || '').trim();
    }

    function highlightText(value) {
      const tokens = [];
      const stash = (cls, raw) => {
        const index = tokens.push(`<span class="${cls}">${raw}</span>`) - 1;
        return `@@H${index}@@`;
      };
      let text = cleanText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

        if (/^[x×]/i.test(match)) return stash('purple', match);
        if (/^\+/.test(match)) return stash('pos', match);

      });
      text = text.replace(/(攻击力|生命值|力量|敏捷|智力|护甲|暴击|暴伤|攻击速度|移速|技能伤害|魔法伤害|物理伤害|无视闪避|金币|木材|经验|自适应伤害)/g, '<span class="gold">$1</span>');

        lines.push(`前置节点：${item.parent_id || '无'}`);
        lines.push(`线路层级：${item.line_name} · ${item.tier_text}`);
        if (item.desc_advanced) lines.push(`进阶说明：${item.desc_advanced}`);
      }
      if (item.route_tags && item.route_tags.length > 0) {
        lines.push(`路线标签：${item.route_tags.join('，')}`);
      }
      return lines.map(highlightText).filter(Boolean).join('<br />');
    }

    function renderDetail(item) {
      if (!item) return;
      const iconWrap = document.getElementById('detailIconWrap');
      document.getElementById('detailIcon').textContent = item.group_glyph || '羁';
      document.getElementById('detailName').textContent = item.display_name;
      document.getElementById('detailSub').textContent = `${item.group_name} · ${item.line_name} · ${item.tier_text}`;
      document.getElementById('detailTags').innerHTML = buildTags(item);
      document.getElementById('detailSummary').innerHTML = buildSummary(item);
      document.getElementById('detailEffect').innerHTML = buildEffect(item);
      document.getElementById('detailAction').textContent = item.is_root ? '查看主线条件' : '查看节点说明';
      document.getElementById('detailSecondary').textContent = item.is_root ? '定位主线根节点' : '定位前置路线';
      document.getElementById('detailFoot').textContent = item.is_root
        ? '主线节点展示根套装需求和成套效果，适合后续接入真正的存档图鉴。'
        : '子节点展示单卡说明、进阶描述和路线标签，方便后续接入筛选与跳转。';
      iconWrap.className = `detail-icon ${item.quality_class}`;
      document.getElementById('detailName').style.color =
        item.quality_class === 'epic' ? 'var(--purple)' :
        item.quality_class === 'legendary' ? 'var(--gold-0)' :
        'var(--text-0)';
    }

    function filteredItems() {
      if (state.filter === 'all') return BONDS;
      return BONDS.filter(item => item.group_id === state.filter);
    }

    function lineGroups() {
      const items = filteredItems();
      const byLine = new Map();
      for (const item of items) {
        if (!byLine.has(item.line_id)) byLine.set(item.line_id, []);
        byLine.get(item.line_id).push(item);
      }
      const groups = Array.from(byLine.entries()).map(([lineId, list]) => ({
        lineId,
        lineName: list[0]?.line_name || lineId,
        items: list.sort((a, b) => (a.tier - b.tier) || (a.index - b.index)),
        root: list.find(row => row.is_root) || list[0] || null,
      }));
      groups.sort((a, b) => (a.root?.index || 0) - (b.root?.index || 0));
      return groups;
    }

    function renderNav() {
      nav.innerHTML = GROUP_ORDER.map(key => `
        <button type="button" class="nav-item ${state.filter === key ? 'active' : ''}" data-group="${key}">
          <span class="key">${GROUP_GLYPHS[key]}</span>
          <span class="label">${GROUP_TEXT[key]} ${key === 'all' ? '' : `(${groupCounts[key] || 0})`}</span>
        </button>
      `).join('');
      filters.innerHTML = GROUP_ORDER.map(key => `
        <button type="button" class="filter ${state.filter === key ? 'active' : ''}" data-group="${key}">
          <span>${GROUP_TEXT[key]}</span>
          <span class="count">${key === 'all' ? BONDS.length : groupCounts[key] || 0}</span>
        </button>
      `).join('');
    }

    function renderGrid() {
      const groups = lineGroups();
      if (!groups.length) {
        lineStrip.innerHTML = '';
        grid.innerHTML = '<div class="empty">当前分类没有可显示的羁绊线。</div>';
        document.getElementById('gridHint').textContent = '没有匹配节点';
        return;
      }

      if (!state.selectedLine || !groups.some(group => group.lineId === state.selectedLine)) {
        state.selectedLine = groups[0].lineId;
      }

      const currentGroup = groups.find(group => group.lineId === state.selectedLine) || groups[0];
      const items = currentGroup.items.slice(0, 15);
      const slots = Array.from({ length: 15 }, (_, index) => items[index] || null);

      lineStrip.innerHTML = groups.map(group => `
        <button type="button" class="line-pill ${state.selectedLine === group.lineId ? 'active' : ''}" data-line="${group.lineId}">
          <span>${group.lineName}</span>
          <span class="count">${Math.min(group.items.length, 15)}</span>
        </button>
      `).join('');

      grid.innerHTML = slots.map((item, index) => {
        if (!item) {
          return `
            <div class="card empty-slot">
              <div class="band"></div>
              <div class="glyph">锁</div>
              <div class="title">未开启</div>
              <div class="meta">传统卡册槽位</div>
            </div>
          `;
        }
        return `
          <div class="card ${item.quality_class} ${state.selected === item.id ? 'active' : ''}" data-item="${item.id}">
            <div class="band"></div>
            <div class="glyph">${item.group_glyph}</div>
            <div class="chip">${index + 1}</div>
            <div class="title">${item.display_name}</div>
            <div class="meta">${item.tier_text}</div>
            <div class="selected"></div>
          </div>
        `;
      }).join('');

      if (!state.selected || !currentGroup.items.some(item => item.id === state.selected)) {
        state.selected = currentGroup.root?.id || currentGroup.items[0]?.id || BONDS[0]?.id || null;
      }

      const hiddenCount = Math.max(0, currentGroup.items.length - 15);
      document.getElementById('gridHint').textContent = hiddenCount > 0
        ? `当前线 ${currentGroup.lineName} · 共 ${currentGroup.items.length} 张，右侧固定显示 15 格，另有 ${hiddenCount} 张隐藏。`
        : `当前线 ${currentGroup.lineName} · 共 ${currentGroup.items.length} 张，右侧固定显示 15 格。`;
      renderDetail(BONDS.find(item => item.id === state.selected) || currentGroup.items[0] || BONDS[0]);
      renderNav();
    }

    document.addEventListener('click', event => {
      const navItem = event.target.closest('[data-group]');
      if (navItem) {
        state.filter = navItem.dataset.group;
        state.selectedLine = null;
        renderGrid();
        return;
      }
      const lineItem = event.target.closest('[data-line]');
      if (lineItem) {
        state.selectedLine = lineItem.dataset.line;
        const current = lineGroups().find(group => group.lineId === state.selectedLine);
        state.selected = current?.root?.id || current?.items?.[0]?.id || state.selected;
        renderGrid();
        return;
      }
      const card = event.target.closest('[data-item]');
      if (card) {
        state.selected = card.dataset.item;
        const item = BONDS.find(row => row.id === state.selected);
        if (item) state.selectedLine = item.line_id;
        renderGrid();
        return;
      }
    });

    document.getElementById('detailAction').addEventListener('click', () => {
      const item = BONDS.find(row => row.id === state.selected) || BONDS[0];
      if (!item) return;
      alert(`${item.display_name}\n${item.is_root ? item.root_effect_text || item.root_base_text || '' : item.desc_advanced || item.desc_single || ''}`);
    });

    document.getElementById('detailSecondary').addEventListener('click', () => {
      const item = BONDS.find(row => row.id === state.selected) || BONDS[0];
      if (!item) return;
      state.selectedLine = item.line_id;
      state.filter = item.group_id;
      renderGrid();
    });

    renderGrid();
  </script>
</body>
</html>
